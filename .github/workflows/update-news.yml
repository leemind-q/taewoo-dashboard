name: Update News

on:
  schedule:
    # 30분마다 실행 (KST 기준)
    - cron: '*/30 * * * *'
  workflow_dispatch: # 수동 실행 가능

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scrape Naver News
        run: python3 scripts/scrape-news.py

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news.json
          git diff --staged --quiet || git commit -m "news: auto-update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
