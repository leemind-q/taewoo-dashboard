<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎛️ 태우의 대시보드</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');

    :root {
      --bg: #0a0a0f;
      --card: #12121c;
      --border: #1e1e2e;
      --border-hi: #3a3a4e;
      --text: #e0e0e8;
      --dim: #6a6a7a;
      --accent: #8b5cf6;
      --green: #22c55e;
      --red: #ef4444;
      --blue: #3b82f6;
      --orange: #f59e0b;
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      background-image: radial-gradient(ellipse at top, rgba(139,92,246,0.05) 0%, transparent 50%);
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 3px; }

    /* ─── 헤더 ─── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
    }

    .header h1 {
      font-size: 18px;
      font-weight: 900;
      color: var(--accent);
    }

    .header-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 12px;
      color: var(--dim);
    }

    .live-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .refresh-btn {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--dim);
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-family: inherit;
    }

    .refresh-btn:hover { border-color: var(--border-hi); color: var(--text); }

    /* ─── 그리드 ─── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 16px;
      padding: 20px 24px;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* ─── 위젯 ─── */
    .widget {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.3s;
    }

    .widget:hover { border-color: var(--border-hi); }

    .widget-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }

    .widget-icon { font-size: 18px; }
    .widget-title { font-size: 13px; font-weight: 700; color: var(--dim); letter-spacing: -0.3px; }

    /* ─── 시계 위젯 ─── */
    .clock-time {
      font-size: 42px;
      font-weight: 900;
      color: var(--text);
      font-variant-numeric: tabular-nums;
      letter-spacing: -1px;
    }

    .clock-date {
      font-size: 13px;
      color: var(--dim);
      margin-top: 4px;
    }

    /* ─── 날씨 위젯 ─── */
    .weather-main {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .weather-icon { font-size: 42px; }
    .weather-temp { font-size: 36px; font-weight: 900; }
    .weather-desc { font-size: 13px; color: var(--dim); margin-top: 2px; }
    .weather-location { font-size: 11px; color: var(--dim); margin-bottom: 8px; }

    .weather-details {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 16px;
    }

    .weather-detail {
      text-align: center;
    }

    .weather-detail .label { font-size: 10px; color: var(--dim); }
    .weather-detail .value { font-size: 14px; font-weight: 700; margin-top: 2px; }

    /* ─── 미세먼지 위젯 ─── */
    .aqi-main {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .aqi-circle {
      width: 64px; height: 64px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 900;
    }

    .aqi-info { flex: 1; }
    .aqi-grade { font-size: 16px; font-weight: 700; }
    .aqi-desc { font-size: 11px; color: var(--dim); margin-top: 2px; }

    .aqi-details {
      display: flex;
      gap: 12px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .aqi-item { font-size: 11px; color: var(--dim); }
    .aqi-item span { color: var(--text); font-weight: 700; }

    /* ─── 환율 위젯 ─── */
    .rate-list { display: flex; flex-direction: column; gap: 10px; }

    .rate-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .rate-currency {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .rate-flag { font-size: 16px; }
    .rate-name { font-size: 12px; color: var(--dim); }

    .rate-value {
      font-size: 15px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .rate-change {
      font-size: 11px;
      margin-left: 6px;
    }

    .rate-change.up { color: var(--red); }
    .rate-change.down { color: var(--blue); }

    /* ─── GitHub 위젯 ─── */
    .gh-list { display: flex; flex-direction: column; gap: 10px; }

    .gh-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      text-decoration: none;
      color: var(--text);
      padding: 8px;
      border-radius: 8px;
      transition: background 0.2s;
    }

    .gh-item:hover { background: rgba(139,92,246,0.08); }

    .gh-repo {
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
    }

    .gh-msg {
      font-size: 12px;
      color: var(--text);
      line-height: 1.4;
      margin-top: 2px;
    }

    .gh-time {
      font-size: 10px;
      color: var(--dim);
      margin-top: 2px;
    }

    /* ─── 주식 위젯 ─── */
    .stock-list { display: flex; flex-direction: column; gap: 10px; }

    .stock-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .stock-name { font-size: 13px; font-weight: 700; }
    .stock-price { font-size: 14px; font-weight: 700; font-variant-numeric: tabular-nums; }
    .stock-change { font-size: 12px; font-weight: 600; }
    .stock-change.up { color: var(--red); }
    .stock-change.down { color: var(--blue); }
    .stock-change.flat { color: var(--dim); }

    /* ─── 로딩 ─── */
    .loading {
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .loading span {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      animation: bounce 1.4s infinite ease-in-out both;
      margin: 0 3px;
    }

    .loading span:nth-child(1) { animation-delay: -0.32s; }
    .loading span:nth-child(2) { animation-delay: -0.16s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); opacity: 0.5; }
      40% { transform: scale(1); opacity: 1; }
    }

    /* ─── 에러 ─── */
    .error-msg {
      font-size: 12px;
      color: var(--red);
      text-align: center;
      padding: 20px;
    }

    /* ─── 반응형 ─── */
    @media (max-width: 600px) {
      .header { padding: 12px 16px; }
      .header h1 { font-size: 15px; }
      .grid { padding: 12px; gap: 12px; }
      .clock-time { font-size: 32px; }
      .weather-temp { font-size: 28px; }
    }
  </style>
</head>
<body>
  <header class="header">
    <h1>🎛️ 태우의 대시보드</h1>
    <div class="header-meta">
      <span class="live-dot"></span>
      <span id="last-update">업데이트 중...</span>
      <button class="refresh-btn" onclick="refreshAll()">🔄 새로고침</button>
    </div>
  </header>

  <div class="grid">
    <!-- 시계 -->
    <div class="widget" style="grid-column: span 1;">
      <div class="widget-header">
        <span class="widget-icon">🕐</span>
        <span class="widget-title">현재 시간</span>
      </div>
      <div class="clock-time" id="clock-time">--:--</div>
      <div class="clock-date" id="clock-date">--</div>
    </div>

    <!-- 날씨 -->
    <div class="widget">
      <div class="widget-header">
        <span class="widget-icon">🌤️</span>
        <span class="widget-title">날씨</span>
      </div>
      <div id="weather-content" class="loading"><span></span><span></span><span></span></div>
    </div>

    <!-- 미세먼지 -->
    <div class="widget">
      <div class="widget-header">
        <span class="widget-icon">💨</span>
        <span class="widget-title">대기질</span>
      </div>
      <div id="aqi-content" class="loading"><span></span><span></span><span></span></div>
    </div>

    <!-- 환율 -->
    <div class="widget">
      <div class="widget-header">
        <span class="widget-icon">💱</span>
        <span class="widget-title">환율 (KRW 기준)</span>
      </div>
      <div id="rate-content" class="loading"><span></span><span></span><span></span></div>
    </div>

    <!-- GitHub -->
    <div class="widget">
      <div class="widget-header">
        <span class="widget-icon">🐱</span>
        <span class="widget-title">GitHub 최근 활동</span>
      </div>
      <div id="gh-content" class="loading"><span></span><span></span><span></span></div>
    </div>

    <!-- 주식 -->
    <div class="widget">
      <div class="widget-header">
        <span class="widget-icon">📈</span>
        <span class="widget-title">주식 (네이버 금융)</span>
      </div>
      <div id="stock-content" class="loading"><span></span><span></span><span></span></div>
    </div>
  </div>

  <script>
    // ═══════════════════════════════════════════════════════════════
    // 태우의 대시보드 — API 통합
    // 무료 API만 사용 (키 불필요)
    // ═══════════════════════════════════════════════════════════════

    // 인천 남동구 좌표
    const LAT = 37.4476;
    const LON = 126.7316;

    // ─── 시계 ────────────────────────────────────────────────────────
    function updateClock() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      const s = String(now.getSeconds()).padStart(2, '0');
      document.getElementById('clock-time').textContent = `${h}:${m}:${s}`;

      const days = ['일', '월', '화', '수', '목', '금', '토'];
      const day = days[now.getDay()];
      const dateStr = `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 ${day}요일`;
      document.getElementById('clock-date').textContent = dateStr;
    }
    updateClock();
    setInterval(updateClock, 1000);

    // ─── 날씨 (Open-Meteo) ───────────────────────────────────────────
    async function loadWeather() {
      const el = document.getElementById('weather-content');
      try {
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m&daily=temperature_2m_max,temperature_2m_min&timezone=Asia/Seoul`;
        const resp = await fetch(url);
        const data = await resp.json();

        const temp = Math.round(data.current.temperature_2m);
        const feels = Math.round(data.current.apparent_temperature);
        const humidity = data.current.relative_humidity_2m;
        const wind = Math.round(data.current.wind_speed_10m);
        const code = data.current.weather_code;
        const maxT = Math.round(data.daily.temperature_2m_max[0]);
        const minT = Math.round(data.daily.temperature_2m_min[0]);

        const icon = weatherIcon(code);
        const desc = weatherDesc(code);

        el.innerHTML = `
          <div class="weather-location">📍 인천 남동구</div>
          <div class="weather-main">
            <span class="weather-icon">${icon}</span>
            <div>
              <div class="weather-temp">${temp}°</div>
              <div class="weather-desc">${desc} · 체감 ${feels}°</div>
            </div>
          </div>
          <div class="weather-details">
            <div class="weather-detail"><div class="label">최고</div><div class="value">${maxT}°</div></div>
            <div class="weather-detail"><div class="label">최저</div><div class="value">${minT}°</div></div>
            <div class="weather-detail"><div class="label">습도</div><div class="value">${humidity}%</div></div>
          </div>
        `;
      } catch (e) {
        el.innerHTML = '<div class="error-msg">날씨 로드 실패</div>';
      }
    }

    function weatherIcon(code) {
      if (code === 0) return '☀️';
      if (code <= 3) return '⛅';
      if (code <= 48) return '🌫️';
      if (code <= 67) return '🌧️';
      if (code <= 77) return '🌨️';
      if (code <= 82) return '🌦️';
      if (code <= 86) return '🌨️';
      if (code >= 95) return '⛈️';
      return '🌤️';
    }

    function weatherDesc(code) {
      if (code === 0) return '맑음';
      if (code <= 3) return '구름 많음';
      if (code <= 48) return '안개';
      if (code <= 57) return '이슬비';
      if (code <= 67) return '비';
      if (code <= 77) return '눈';
      if (code <= 82) return '소나기';
      if (code <= 86) return '눈 소나기';
      if (code >= 95) return '뇌우';
      return '흐림';
    }

    // ─── 대기질 (Open-Meteo Air Quality) ─────────────────────────────
    async function loadAirQuality() {
      const el = document.getElementById('aqi-content');
      try {
        const url = `https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${LAT}&longitude=${LON}&current=pm10,pm2_5,carbon_monoxide,ozone,nitrogen_dioxide&timezone=Asia/Seoul`;
        const resp = await fetch(url);
        const data = await resp.json();

        const pm10 = data.current.pm10;
        const pm25 = data.current.pm2_5;
        const o3 = data.current.ozone;
        const no2 = data.current.nitrogen_dioxide;

        const grade = aqiGrade(pm10);
        const color = aqiColor(pm10);

        el.innerHTML = `
          <div class="weather-location">📍 인천 남동구</div>
          <div class="aqi-main">
            <div class="aqi-circle" style="background:${color}20;border:2px solid ${color};color:${color}">${Math.round(pm10)}</div>
            <div class="aqi-info">
              <div class="aqi-grade" style="color:${color}">${grade}</div>
              <div class="aqi-desc">PM10 기준 · 단위 µg/m³</div>
            </div>
          </div>
          <div class="aqi-details">
            <div class="aqi-item">PM2.5 <span>${Math.round(pm25)}</span></div>
            <div class="aqi-item">오존 <span>${Math.round(o3)}</span></div>
            <div class="aqi-item">이산화질소 <span>${Math.round(no2)}</span></div>
          </div>
        `;
      } catch (e) {
        el.innerHTML = '<div class="error-msg">대기질 로드 실패</div>';
      }
    }

    function aqiGrade(pm10) {
      if (pm10 <= 30) return '좋음';
      if (pm10 <= 80) return '보통';
      if (pm10 <= 150) return '나쁨';
      return '매우 나쁨';
    }

    function aqiColor(pm10) {
      if (pm10 <= 30) return '#22c55e';
      if (pm10 <= 80) return '#f59e0b';
      if (pm10 <= 150) return '#ef4444';
      return '#991b1b';
    }

    // ─── 환율 (exchangerate.host) ───────────────────────────────────
    let prevRates = {};
    async function loadExchangeRates() {
      const el = document.getElementById('rate-content');
      try {
        const resp = await fetch('https://open.er-api.com/v6/latest/KRW');
        const data = await resp.json();

        const rates = data.rates;
        const currencies = [
          { code: 'USD', flag: '🇺🇸', name: '달러', rate: rates.USD },
          { code: 'EUR', flag: '🇪🇺', name: '유로', rate: rates.EUR },
          { code: 'JPY', flag: '🇯🇵', name: '엔 (100)', rate: rates.JPY * 100 },
          { code: 'CNY', flag: '🇨🇳', name: '위안', rate: rates.CNY },
          { code: 'GBP', flag: '🇬🇧', name: '파운드', rate: rates.GBP }
        ];

        let html = '<div class="rate-list">';
        currencies.forEach(c => {
          const value = (1 / c.rate).toFixed(2);
          const prev = prevRates[c.code];
          let changeHtml = '';
          if (prev) {
            const diff = (1/c.rate - 1/prev);
            if (Math.abs(diff) > 0.01) {
              const cls = diff > 0 ? 'up' : 'down';
              const arrow = diff > 0 ? '▲' : '▼';
              changeHtml = `<span class="rate-change ${cls}">${arrow} ${Math.abs(diff).toFixed(2)}</span>`;
            }
          }
          html += `
            <div class="rate-row">
              <div class="rate-currency">
                <span class="rate-flag">${c.flag}</span>
                <span class="rate-name">${c.name}</span>
              </div>
              <div>
                <span class="rate-value">${value}</span>${changeHtml}
              </div>
            </div>
          `;
          prevRates[c.code] = c.rate;
        });
        html += '</div>';
        el.innerHTML = html;
      } catch (e) {
        el.innerHTML = '<div class="error-msg">환율 로드 실패</div>';
      }
    }

    // ─── GitHub 활동 ────────────────────────────────────────────────
    async function loadGitHub() {
      const el = document.getElementById('gh-content');
      try {
        const resp = await fetch('https://api.github.com/users/leemind-q/events/public?per_page=5');
        if (!resp.ok) throw new Error('API rate limit');
        const events = await resp.json();

        if (!Array.isArray(events) || events.length === 0) {
          el.innerHTML = '<div class="error-msg" style="color:var(--dim)">최근 활동 없음</div>';
          return;
        }

        let html = '<div class="gh-list">';
        events.slice(0, 5).forEach(ev => {
          let repo = ev.repo.name;
          let msg = '';
          let url = `https://github.com/${repo}`;

          if (ev.type === 'PushEvent') {
            const commits = ev.payload.commits || [];
            msg = commits.length > 0 ? (commits[0].message || '').split('\n')[0] : 'push';
            url = `https://github.com/${repo}/commit/${commits[0]?.sha || ''}`;
          } else if (ev.type === 'CreateEvent') {
            msg = `${ev.payload.ref_type || 'branch'} 생성: ${ev.payload.ref || ''}`;
          } else if (ev.type === 'WatchEvent') {
            msg = '⭐ 스타';
          } else if (ev.type === 'ForkEvent') {
            msg = '🍴 포크';
          } else if (ev.type === 'ReleaseEvent') {
            msg = `📦 릴리즈: ${ev.payload.release?.name || ''}`;
          } else {
            msg = ev.type.replace('Event', '');
          }

          const timeAgo = timeAgoStr(ev.created_at);

          // textContent 사용으로 XSS 방지
          html += `
            <a class="gh-item" href="${url}" target="_blank">
              <div style="flex:1">
                <div class="gh-repo">${escapeHtml(repo)}</div>
                <div class="gh-msg">${escapeHtml(msg)}</div>
                <div class="gh-time">${timeAgo}</div>
              </div>
            </a>
          `;
        });
        html += '</div>';
        el.innerHTML = html;
      } catch (e) {
        el.innerHTML = '<div class="error-msg">GitHub 로드 실패 (API 한도)</div>';
      }
    }

    function timeAgoStr(dateStr) {
      const diff = Date.now() - new Date(dateStr).getTime();
      const min = Math.floor(diff / 60000);
      if (min < 1) return '방금 전';
      if (min < 60) return `${min}분 전`;
      const hour = Math.floor(min / 60);
      if (hour < 24) return `${hour}시간 전`;
      const day = Math.floor(hour / 24);
      return `${day}일 전`;
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // ─── 주식 (네이버 금융 — CORS 우회용 간접 방식) ──────────────────
    async function loadStocks() {
      const el = document.getElementById('stock-content');
      const stocks = [
        { name: '삼성전자', code: '005930' },
        { name: 'SK하이닉스', code: '000660' },
        { name: '현대차', code: '005380' },
        { name: 'KOSPI', code: 'KSPI' }
      ];

      // 네이버 금융은 CORS가 막혀있어서 직접 fetch가 안 됨
      // 대신 링크를 제공 + 캐시된 데이터 표시
      try {
        // allorigins CORS proxy 사용 (무료)
        const results = await Promise.allSettled(
          stocks.filter(s => s.code !== 'KSPI').map(async s => {
            const url = `https://api.allorigins.win/raw?url=${encodeURIComponent('https://finance.naver.com/item/main.naver?code=' + s.code)}`;
            const ctrl = new AbortController();
            const timeout = setTimeout(() => ctrl.abort(), 8000);
            try {
              const resp = await fetch(url, { signal: ctrl.signal });
              const html = await resp.text();

              const priceMatch = html.match(/<div class="blind">\s*<p>\s*현재가\s*([\d,]+)/);
              const changeMatch = html.match(/전일비\s*([-]?[\d.]+)%/);

              return {
                name: s.name,
                code: s.code,
                price: priceMatch ? priceMatch[1] : 'N/A',
                change: changeMatch ? parseFloat(changeMatch[1]) : 0
              };
            } finally {
              clearTimeout(timeout);
            }
          })
        );

        let html = '<div class="stock-list">';
        results.forEach((result, i) => {
          if (result.status === 'fulfilled' && result.value) {
            const s = result.value;
            const cls = s.change > 0 ? 'up' : s.change < 0 ? 'down' : 'flat';
            const arrow = s.change > 0 ? '▲' : s.change < 0 ? '▼' : '-';
            html += `
              <div class="stock-row">
                <div>
                  <div class="stock-name">${s.name}</div>
                </div>
                <div style="text-align:right">
                  <div class="stock-price">${s.price}</div>
                  <div class="stock-change ${cls}">${arrow} ${Math.abs(s.change)}%</div>
                </div>
              </div>
            `;
          } else {
            const s = stocks[i];
            html += `
              <div class="stock-row">
                <div><div class="stock-name">${s.name}</div></div>
                <div class="stock-change flat" style="font-size:11px"><a href="https://finance.naver.com/item/main.naver?code=${s.code}" target="_blank" style="color:var(--dim);text-decoration:none">네이버 금융 →</a></div>
              </div>
            `;
          }
        });
        html += '</div>';
        el.innerHTML = html;
      } catch (e) {
        el.innerHTML = '<div class="error-msg">주식 로드 실패</div>';
      }
    }

    // ─── 전체 새로고침 ───────────────────────────────────────────────
    function refreshAll() {
      loadWeather();
      loadAirQuality();
      loadExchangeRates();
      loadGitHub();
      loadStocks();
      document.getElementById('last-update').textContent = '업데이트: ' + new Date().toLocaleTimeString('ko-KR');
    }

    // ─── 초기 로드 ───────────────────────────────────────────────────
    refreshAll();
    // 5분마다 자동 새로고침
    setInterval(refreshAll, 300000);
  </script>
</body>
</html>
