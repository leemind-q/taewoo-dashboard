<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mission Control — taewoo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
/* ═══════════════════════════════════════════════════════════════
   MISSION CONTROL v3 — Premium Homepage Design
   Reference: Arc Browser + Linear + Raycast aesthetic
   Techniques: glassmorphism, noise texture, gradient borders,
               staggered entrance, shimmer loading, glow effects
   ═══════════════════════════════════════════════════════════════ */

/* ── Design Tokens ── */
:root {
  --bg-primary: #09090b;
  --bg-secondary: rgba(15, 15, 18, 0.85);
  --bg-tertiary: rgba(22, 22, 26, 0.75);
  --bg-elevated: rgba(26, 26, 31, 0.7);
  --bg-hover: rgba(255,255,255,0.05);
  --bg-active: rgba(255,255,255,0.08);
  --bg-glass: rgba(15, 15, 18, 0.6);

  --border-subtle: rgba(255,255,255,0.07);
  --border-default: rgba(255,255,255,0.10);
  --border-hover: rgba(255,255,255,0.18);
  --border-focus: rgba(251,191,36,0.5);

  --text-primary: #fafafa;
  --text-secondary: rgba(255,255,255,0.6);
  --text-tertiary: rgba(255,255,255,0.35);
  --text-quaternary: rgba(255,255,255,0.18);

  --accent: #fbbf24;
  --accent-dim: rgba(251,191,36,0.12);
  --accent-glow: rgba(251,191,36,0.06);
  --blue: #60a5fa;
  --green: #34d399;
  --red: #f87171;
  --purple: #a78bfa;
  --pink: #f472b6;
  --orange: #fb923c;
  --cyan: #22d3ee;

  --font-display: 'Space Grotesk', -apple-system, sans-serif;
  --font-body: 'DM Sans', -apple-system, sans-serif;

  --radius-xl: 16px;
  --radius-lg: 12px;
  --radius-md: 8px;
  --radius-full: 9999px;

  --shadow-sm: 0 1px 2px rgba(0,0,0,0.5);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.4);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.5);
  --shadow-glow: 0 0 60px rgba(251,191,36,0.04);
  --shadow-inner: inset 0 1px 0 rgba(255,255,255,0.04);

  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --duration: 0.25s;
  --duration-slow: 0.5s;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html { 
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}

body {
  font-family: var(--font-body);
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  line-height: 1.5;
}

/* ── Ambient glow background (triple source) ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  background:
    radial-gradient(ellipse 80% 50% at 50% -15%, rgba(251,191,36,0.06), transparent 60%),
    radial-gradient(ellipse 55% 45% at 80% 110%, rgba(96,165,250,0.04), transparent 50%),
    radial-gradient(ellipse 40% 35% at 20% 60%, rgba(168,85,247,0.03), transparent 45%);
}

/* ── Noise/grain texture overlay (Raycast-style) ── */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  opacity: 0.4;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-repeat: repeat;
  background-size: 256px 256px;
  mix-blend-mode: overlay;
}

/* ── Layout ── */
.page {
  position: relative;
  z-index: 1;
  max-width: 1400px;
  margin: 0 auto;
  padding: 32px 40px 48px;
}

/* ── Top Bar ── */
.topbar {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 28px;
}

.logo {
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.25em;
  color: var(--text-tertiary);
  text-transform: uppercase;
  flex-shrink: 0;
}

.logo-dot {
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
  margin-right: 8px;
  vertical-align: middle;
  box-shadow: 0 0 10px rgba(251,191,36,0.4);
}

.nav-pills {
  display: flex;
  gap: 4px;
  margin-left: 8px;
}

.nav-pill {
  padding: 7px 18px;
  border: none;
  border-radius: var(--radius-full);
  background: transparent;
  color: var(--text-tertiary);
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--duration) var(--ease-out);
  letter-spacing: 0.01em;
  position: relative;
  overflow: hidden;
}

.nav-pill:hover { color: var(--text-secondary); background: var(--bg-hover); }

/* Active pill glow (Linear-style) */
.nav-pill.active {
  color: var(--accent);
  background: var(--accent-dim);
  box-shadow:
    0 0 24px rgba(251, 191, 36, 0.06),
    inset 0 1px 0 rgba(251, 191, 36, 0.1);
}

/* Pill hover shimmer */
.nav-pill::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at center, rgba(255,255,255,0.05), transparent 70%);
  opacity: 0;
  transition: opacity var(--duration) var(--ease-out);
  pointer-events: none;
}
.nav-pill:hover::after { opacity: 1; }

.topbar-actions {
  margin-left: auto;
  display: flex;
  gap: 8px;
}

.btn-icon {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 36px; height: 36px;
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  background: var(--bg-glass);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  color: var(--text-tertiary);
  cursor: pointer;
  transition: all var(--duration) var(--ease-out);
}
.btn-icon:hover { color: var(--text-secondary); background: var(--bg-hover); border-color: var(--border-hover); }
.btn-icon:active { transform: scale(0.95); }
.btn-icon svg { width: 16px; height: 16px; }
.btn-icon.spinning svg { animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Bento Grid ── */
.bento {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  grid-auto-rows: min-content;
  gap: 16px;
  opacity: 0;
  animation: bentoFadeIn 0.6s var(--ease-out) forwards;
}

@keyframes bentoFadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Column spans */
.col-12 { grid-column: span 12; }
.col-8  { grid-column: span 8; }
.col-6  { grid-column: span 6; }
.col-4  { grid-column: span 4; }

/* ── Premium Card System ── */
.card {
  background: var(--bg-glass);
  backdrop-filter: blur(16px) saturate(140%);
  -webkit-backdrop-filter: blur(16px) saturate(140%);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-xl);
  overflow: hidden;
  transition:
    border-color var(--duration) var(--ease-out),
    transform var(--duration) var(--ease-out),
    box-shadow var(--duration) var(--ease-out);
  position: relative;
  box-shadow:
    var(--shadow-inner),
    var(--shadow-sm);
}

/* Card inner highlight line */
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg,
    transparent,
    rgba(255,255,255,0.06) 20%,
    rgba(255,255,255,0.06) 80%,
    transparent);
  z-index: 2;
  pointer-events: none;
}

/* Hover lift (Arc/Linear-style) */
.card:hover {
  border-color: var(--border-default);
  transform: translateY(-2px);
  box-shadow:
    var(--shadow-inner),
    var(--shadow-lg),
    0 0 40px rgba(251, 191, 36, 0.02);
}

/* Staggered card entrance animation */
.card {
  animation: cardIn 0.5s var(--ease-out) both;
}
.card:nth-child(1) { animation-delay: 0.00s; }
.card:nth-child(2) { animation-delay: 0.05s; }
.card:nth-child(3) { animation-delay: 0.10s; }
.card:nth-child(4) { animation-delay: 0.15s; }
.card:nth-child(5) { animation-delay: 0.20s; }
.card:nth-child(6) { animation-delay: 0.25s; }
.card:nth-child(7) { animation-delay: 0.30s; }
.card:nth-child(8) { animation-delay: 0.35s; }

@keyframes cardIn {
  from {
    opacity: 0;
    transform: translateY(16px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.card-body {
  padding: 24px;
  position: relative;
  z-index: 1;
}

.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}

.card-label {
  font-family: var(--font-body);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.12em;
  color: var(--text-quaternary);
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 8px;
}

/* Label dots with color glow */
.label-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
  box-shadow: 0 0 8px currentColor;
}

/* ── Search ── */
.search-card { background: rgba(22, 22, 26, 0.8); }
.search-card .card-body { padding: 16px 20px; }

.search-row {
  display: flex;
  align-items: center;
  gap: 12px;
}

.search-icon-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 40px; height: 40px;
  border-radius: var(--radius-md);
  background: var(--bg-active);
  flex-shrink: 0;
}
.search-icon-wrap svg { width: 18px; height: 18px; color: var(--text-tertiary); }

.search-input {
  flex: 1;
  border: none;
  background: transparent;
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 15px;
  outline: none;
  letter-spacing: 0.01em;
}
.search-input::placeholder { color: var(--text-quaternary); }

.search-engine-pills {
  display: flex;
  gap: 4px;
  flex-shrink: 0;
}

.engine-pill {
  padding: 5px 14px;
  border: none;
  border-radius: var(--radius-full);
  background: transparent;
  color: var(--text-quaternary);
  font-family: var(--font-body);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--duration) var(--ease-out);
  position: relative;
  overflow: hidden;
}
.engine-pill:hover { color: var(--text-tertiary); }
.engine-pill.active { color: var(--accent); background: var(--accent-dim); }

/* ── Clock ── */
.clock-card .card-body { padding: 32px; }

.clock-time {
  font-family: var(--font-display);
  font-weight: 300;
  font-size: 72px;
  line-height: 1;
  letter-spacing: -0.03em;
  color: var(--text-primary);
}

.clock-seconds {
  font-size: 28px;
  font-weight: 300;
  color: var(--text-quaternary);
  vertical-align: super;
  margin-left: 2px;
}

.clock-date {
  font-size: 14px;
  color: var(--text-secondary);
  margin-top: 8px;
  font-weight: 400;
}

.clock-greeting {
  font-size: 14px;
  color: var(--text-tertiary);
  margin-top: 4px;
}

/* ── Weather ── */
.weather-card .card-body { padding: 24px 28px; }

.weather-layout {
  display: flex;
  gap: 24px;
  align-items: flex-start;
}

.weather-main { flex: 1; }

.weather-temp-row {
  display: flex;
  align-items: flex-start;
  gap: 12px;
}

.weather-temp {
  font-family: var(--font-display);
  font-weight: 300;
  font-size: 56px;
  line-height: 1;
  letter-spacing: -0.02em;
}

.weather-icon-text { font-size: 36px; line-height: 1.2; }

.weather-desc {
  font-size: 14px;
  color: var(--text-secondary);
  margin-top: 4px;
}

.weather-detail-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-top: 16px;
}

.weather-detail {
  background: var(--bg-tertiary);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-radius: var(--radius-md);
  padding: 10px 12px;
  border: 1px solid var(--border-subtle);
}

.weather-detail-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.08em;
  color: var(--text-quaternary);
  text-transform: uppercase;
}

.weather-detail-value {
  font-family: var(--font-display);
  font-size: 15px;
  font-weight: 500;
  color: var(--text-primary);
  margin-top: 2px;
}

.weather-forecast {
  display: flex;
  flex-direction: column;
  gap: 8px;
  flex-shrink: 0;
  min-width: 100px;
}

.forecast-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 12px;
  background: var(--bg-tertiary);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-radius: var(--radius-md);
  font-size: 12px;
  color: var(--text-secondary);
  border: 1px solid var(--border-subtle);
}

.forecast-item .day { color: var(--text-tertiary); font-weight: 500; }
.forecast-item .hi-lo { font-family: var(--font-display); font-weight: 500; color: var(--text-primary); }

/* ── News ── */
.news-card .card-body { padding: 20px 24px; }

.news-tabs {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--border-subtle);
  margin-bottom: 16px;
  margin-left: -24px;
  margin-right: -24px;
  padding: 0 24px;
}

.news-tab {
  padding: 10px 20px;
  border: none;
  border-bottom: 2px solid transparent;
  background: none;
  color: var(--text-tertiary);
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--duration) var(--ease-out);
  margin-bottom: -1px;
}
.news-tab:hover { color: var(--text-secondary); }
.news-tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

.news-list { display: flex; flex-direction: column; gap: 2px; }

.news-item {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 12px 14px;
  border-radius: var(--radius-md);
  text-decoration: none;
  color: inherit;
  transition: all var(--duration) var(--ease-out);
}
.news-item:hover {
  background: var(--bg-hover);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}
.news-item:hover .news-title { color: var(--accent); }

.news-index {
  font-family: var(--font-display);
  font-size: 11px;
  font-weight: 500;
  color: var(--text-quaternary);
  min-width: 20px;
  text-align: right;
  flex-shrink: 0;
  padding-top: 2px;
}

.news-body { flex: 1; min-width: 0; }

.news-title {
  font-size: 14px;
  font-weight: 400;
  color: var(--text-primary);
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  transition: color var(--duration) var(--ease-out);
}

.news-source {
  font-size: 11px;
  color: var(--text-quaternary);
  margin-top: 4px;
}

/* ── GitHub ── */
.github-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
}

.github-stat {
  background: var(--bg-tertiary);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-radius: var(--radius-md);
  padding: 14px 16px;
  text-align: center;
  border: 1px solid var(--border-subtle);
  transition: all var(--duration) var(--ease-out);
}
.github-stat:hover { border-color: var(--border-default); }

.github-stat-value {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 600;
  color: var(--text-primary);
}

.github-stat-label {
  font-size: 11px;
  color: var(--text-tertiary);
  font-weight: 500;
  margin-top: 2px;
}

.github-repos {
  margin-top: 12px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.github-repo {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: var(--text-secondary);
  padding: 6px 0;
}

.github-repo-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--text-quaternary);
  flex-shrink: 0;
  box-shadow: 0 0 4px var(--text-quaternary);
}

/* ── Dev Status ── */
.dev-grid {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.dev-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  background: var(--bg-tertiary);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-radius: var(--radius-md);
  transition: all var(--duration) var(--ease-out);
  border: 1px solid transparent;
}

.dev-row:hover {
  background: var(--bg-hover);
  border-color: var(--border-default);
}

.dev-name {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-primary);
}

/* Status dot with breathing pulse */
.dev-status-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
  position: relative;
}
.dev-status-dot.green {
  background: var(--green);
  box-shadow: 0 0 8px rgba(52,211,153,0.4);
  animation: breathe 2s ease-in-out infinite;
}
.dev-status-dot.yellow {
  background: var(--accent);
  box-shadow: 0 0 8px rgba(251,191,36,0.4);
  animation: breathe 2.5s ease-in-out infinite;
}

@keyframes breathe {
  0%, 100% { box-shadow: 0 0 6px rgba(52,211,153,0.25); }
  50%      { box-shadow: 0 0 14px rgba(52,211,153,0.5); }
}

.dev-status-text {
  font-size: 12px;
  color: var(--text-tertiary);
  font-weight: 400;
}

/* ── Quick Links ── */
.links-card .card-body { padding: 20px 24px 24px; }

.links-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
}

.link-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  border-radius: var(--radius-md);
  background: var(--bg-tertiary);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  text-decoration: none;
  color: var(--text-secondary);
  font-size: 13px;
  font-weight: 500;
  transition: all var(--duration) var(--ease-out);
  border: 1px solid transparent;
  position: relative;
}

.link-btn:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
  border-color: var(--border-default);
  transform: translateY(-1px);
}

/* Animated gradient border on hover (Raycast-inspired) */
.link-btn::before {
  content: '';
  position: absolute;
  inset: -1px;
  border-radius: inherit;
  background: linear-gradient(135deg,
    rgba(251,191,36,0.15),
    rgba(96,165,250,0.15),
    rgba(251,191,36,0.15));
  z-index: -1;
  opacity: 0;
  transition: opacity var(--duration) var(--ease-out);
  pointer-events: none;
}
.link-btn:hover::before { opacity: 1; }

.link-emoji { font-size: 16px; flex-shrink: 0; }

/* ── Air Quality ── */
.air-display {
  text-align: center;
}

.air-value-row {
  display: flex;
  align-items: baseline;
  justify-content: center;
  gap: 8px;
}

.air-value {
  font-family: var(--font-display);
  font-size: 40px;
  font-weight: 300;
  color: var(--text-primary);
}

.air-grade {
  font-size: 13px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: var(--radius-full);
  background: rgba(52,211,153,0.12);
  color: var(--green);
}

.air-breakdown {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-top: 16px;
}

.air-row {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: var(--text-secondary);
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border-subtle);
}
.air-row:last-child { border-bottom: none; }

.air-row-label { color: var(--text-tertiary); }
.air-row-value { font-family: var(--font-display); font-weight: 500; color: var(--text-primary); }

/* ── Memo ── */
.memo-container { display: none; flex-direction: column; height: calc(100vh - 140px); }
.memo-container.active { display: flex; }

.memo-toolbar {
  display: flex;
  gap: 6px;
  padding: 12px 0;
  border-bottom: 1px solid var(--border-subtle);
  margin-bottom: 16px;
  flex-wrap: wrap;
}

.memo-tool-btn {
  padding: 6px 14px;
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  background: var(--bg-glass);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  color: var(--text-secondary);
  font-family: var(--font-body);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--duration) var(--ease-out);
}
.memo-tool-btn:hover { background: var(--bg-hover); color: var(--text-primary); border-color: var(--border-hover); }

.memo-editor { flex: 1; min-height: 0; display: flex; flex-direction: column; }
.memo-editor textarea, .memo-editor .preview {
  flex: 1;
  background: var(--bg-glass);
  backdrop-filter: blur(12px) saturate(140%);
  -webkit-backdrop-filter: blur(12px) saturate(140%);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  padding: 24px;
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 14px;
  line-height: 1.8;
  outline: none;
  resize: none;
  overflow: auto;
}
.memo-editor textarea:focus { border-color: var(--border-hover); }
.memo-editor .preview { display: none; }
.memo-editor .preview.show { display: block; }
.memo-editor .preview h1, .memo-editor .preview h2, .memo-editor .preview h3 { font-family: var(--font-display); color: var(--text-primary); margin: 16px 0 8px; }
.memo-editor .preview p { margin: 8px 0; color: var(--text-secondary); }
.memo-editor .preview code { background: var(--bg-tertiary); padding: 2px 6px; border-radius: 4px; font-size: 13px; }
.memo-editor .preview ul, .memo-editor .preview ol { padding-left: 20px; color: var(--text-secondary); }

/* ── Shimmer Loading (Linear-style skeleton) ── */
.skeleton {
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 0;
  color: var(--text-quaternary);
  font-size: 13px;
}
.skeleton::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg,
    transparent,
    rgba(255,255,255,0.025) 50%,
    transparent
  );
  animation: shimmer 2s ease-in-out infinite;
}
@keyframes shimmer {
  0%   { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}

/* ── Responsive ── */
@media (max-width: 1200px) {
  .page { padding: 24px; }
  .col-8 { grid-column: span 12; }
  .col-6 { grid-column: span 6; }
}

@media (max-width: 768px) {
  .page { padding: 16px; }
  .bento { gap: 12px; }
  .col-12, .col-8, .col-6, .col-4 { grid-column: span 12; }
  .clock-time { font-size: 56px; }
  .clock-card .card-body { padding: 24px; }
  .weather-temp { font-size: 44px; }
  .weather-layout { flex-direction: column; }
  .weather-forecast { flex-direction: row; min-width: auto; }
  .github-grid { grid-template-columns: repeat(2, 1fr); }
  .links-grid { grid-template-columns: repeat(2, 1fr); }
  .logo { display: none; }
  .card-body { padding: 18px; }
  .news-card .card-body { padding: 16px 18px; }
}

/* ── Footer ── */
.footer {
  text-align: center;
  padding-top: 32px;
  font-size: 12px;
  color: var(--text-quaternary);
  letter-spacing: 0.05em;
}
</style>

<script>
/* ═══════════════════════════════════════════════════
   MISSION CONTROL v3 — Application Logic
   ═══════════════════════════════════════════════════ */

// ── Tab ──
function switchTab(tab) {
  document.getElementById('view-dashboard').style.display = tab === 'dashboard' ? '' : 'none';
  document.getElementById('view-memo').classList.toggle('active', tab === 'memo');
  document.getElementById('navDash').classList.toggle('active', tab === 'dashboard');
  document.getElementById('navMemo').classList.toggle('active', tab === 'memo');
  if (tab === 'memo') loadMemo();
}

// ── Clock ──
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('clockDisplay').innerHTML = `${h}:${m}<span class="clock-seconds">${s}</span>`;

  const days = ['일요일','월요일','화요일','수요일','목요일','금요일','토요일'];
  document.getElementById('dateDisplay').textContent =
    `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')} ${days[now.getDay()]}`;

  const hour = now.getHours();
  let greeting = hour < 6 ? '좋은 새벽이에요' : hour < 12 ? '좋은 아침이에요' : hour < 18 ? '좋은 오후예요' : '좋은 저녁이에요';
  document.getElementById('greetingDisplay').textContent = greeting;
}
setInterval(updateClock, 1000);
updateClock();

// ── Search ──
let searchEngine = 'naver';
const searchUrls = {
  naver: 'https://search.naver.com/search.naver?query=',
  google: 'https://www.google.com/search?q=',
  github: 'https://github.com/search?q=',
};

function setEngine(name) {
  searchEngine = name;
  document.querySelectorAll('.engine-pill').forEach(b => {
    b.classList.toggle('active', b.textContent.toLowerCase() === name);
  });
  const ph = { naver: 'Search anything...', google: 'Search anything...', github: 'Search anything...' };
  document.getElementById('searchInput').placeholder = ph[name];
}

function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  window.open(searchUrls[searchEngine] + encodeURIComponent(q), '_blank');
}

// ── Weather ──
async function loadWeather() {
  const el = document.getElementById('weatherContent');
  try {
    const res = await fetch('https://wttr.in/Incheon?format=j1');
    const data = await res.json();
    const cur = data.current_condition[0];
    const days = ['일','월','화','수','목','금','토'];
    const codeMap = {'113':'☀️','116':'🌤','119':'⛅','122':'☁️','143':'🌫','176':'🌦','179':'🌧','182':'🌧','185':'🌧','200':'⛈','227':'🌨','230':'🌨','248':'🌫','260':'🌫','263':'🌦','266':'🌦','281':'🌧','284':'🌧','293':'🌦','296':'🌦','299':'🌧','302':'🌧','305':'🌧','308':'🌧','311':'🌧','314':'🌧','317':'🌨','320':'🌨','323':'🌨','326':'🌨','329':'🌧','332':'🌧','335':'🌧','338':'🌧','350':'🌧','353':'🌦','356':'🌧','359':'🌧','362':'🌧','365':'🌧','368':'🌨','371':'🌨','374':'🌧','377':'🌧','386':'⛈','389':'⛈','392':'⛈','395':'🌨'};
    const icon = codeMap[cur.weatherCode] || '☁️';
    const forecasts = data.weather.slice(0, 3);

    el.innerHTML = `
      <div class="weather-layout">
        <div class="weather-main">
          <div class="weather-temp-row">
            <div class="weather-temp">${cur.temp_C}°</div>
            <div class="weather-icon-text">${icon}</div>
          </div>
          <div class="weather-desc">${cur.weatherDesc[0].value} · 체감 ${cur.FeelsLikeC}°</div>
          <div class="weather-detail-grid">
            <div class="weather-detail">
              <div class="weather-detail-label">Humidity</div>
              <div class="weather-detail-value">${cur.humidity}%</div>
            </div>
            <div class="weather-detail">
              <div class="weather-detail-label">Wind</div>
              <div class="weather-detail-value">${cur.windspeedKmph}km/h</div>
            </div>
            <div class="weather-detail">
              <div class="weather-detail-label">Visibility</div>
              <div class="weather-detail-value">${cur.visibility}km</div>
            </div>
          </div>
        </div>
        <div class="weather-forecast">
          ${forecasts.map((f,i) => {
            const d = new Date(f.date);
            const fi = codeMap[f.hourly[4]?.weatherCode] || '☁️';
            return `<div class="forecast-item">
              <span class="day">${i===0?'오늘':days[d.getDay()]}</span>
              <span class="hi-lo">${f.mintempC}°/${f.maxtempC}°</span>
            </div>`;
          }).join('')}
        </div>
      </div>`;
  } catch(e) {
    el.innerHTML = '<div style="color:var(--text-tertiary);font-size:13px;padding:12px 0;">날씨를 불러올 수 없습니다</div>';
  }
}

// ── News ──
let newsData = { categories: {} };
let activeNewsCat = 'IT';

async function loadNews() {
  try {
    const res = await fetch('news.json?_=' + Date.now());
    if (res.ok) newsData = await res.json();
  } catch(e) {}
  renderNews();
}

function renderNews() {
  const tabsEl = document.getElementById('newsTabs');
  const contentEl = document.getElementById('newsContent');
  const cats = Object.keys(newsData.categories || {});

  if (newsData.updated) {
    document.getElementById('newsUpdated').textContent = newsData.updated;
  }

  if (cats.length === 0) {
    contentEl.innerHTML = '<div style="color:var(--text-quaternary);font-size:13px;padding:16px 0;">뉴스를 불러올 수 없습니다</div>';
    tabsEl.innerHTML = '';
    return;
  }

  tabsEl.innerHTML = cats.map(c =>
    `<button class="news-tab ${c===activeNewsCat?'active':''}" onclick="switchNews('${c}')">${c}</button>`
  ).join('');

  const articles = newsData.categories[activeNewsCat] || [];
  contentEl.innerHTML = `<div class="news-list">${articles.map((a,i) => {
    const src = a.source || '';
    return `<a class="news-item" href="${esc(a.link)}" target="_blank" rel="noopener">
      <span class="news-index">${String(i+1).padStart(2,'0')}</span>
      <div class="news-body">
        <div class="news-title">${esc(a.title)}</div>
        ${src ? `<div class="news-source">${esc(src)}</div>` : ''}
      </div>
    </a>`;
  }).join('')}</div>`;
}

function switchNews(cat) { activeNewsCat = cat; renderNews(); }

// ── GitHub ──
async function loadGitHub() {
  const el = document.getElementById('githubContent');
  try {
    const [userRes, reposRes] = await Promise.all([
      fetch('https://api.github.com/users/leemind-q'),
      fetch('https://api.github.com/users/leemind-q/repos?sort=updated&per_page=4')
    ]);
    const user = await userRes.json();
    const repos = await reposRes.json();

    el.innerHTML = `
      <div class="github-grid">
        <div class="github-stat"><div class="github-stat-value">${user.public_repos}</div><div class="github-stat-label">Repos</div></div>
        <div class="github-stat"><div class="github-stat-value">${user.followers}</div><div class="github-stat-label">Followers</div></div>
        <div class="github-stat"><div class="github-stat-value">${user.public_gists||0}</div><div class="github-stat-label">Gists</div></div>
        <div class="github-stat"><div class="github-stat-value">${user.total_private_repos||0}</div><div class="github-stat-label">Private</div></div>
      </div>
      <div class="github-repos">
        ${repos.slice(0,4).map(r => `<div class="github-repo"><span class="github-repo-dot"></span>${esc(r.name)}</div>`).join('')}
      </div>`;
  } catch(e) {
    el.innerHTML = '<div style="color:var(--text-tertiary);font-size:13px;">GitHub API unavailable</div>';
  }
}

// ── Dev Status ──
function loadDevStatus() {
  const items = [
    { name: 'Hermes Agent', status: 'running', color: 'green' },
    { name: 'Godot LDC', status: 'Phase 9', color: 'green' },
    { name: 'Marketing Auto', status: ':8900', color: 'green' },
    { name: 'TREK', status: 'live', color: 'green' },
    { name: 'taewoo-dash', status: 'live', color: 'green' },

  document.getElementById('devContent').innerHTML = items.map(i =>
    `<div class="dev-row">

      <span class="dev-status-text">${esc(i.status)}</span>

// ── Quick Links ──
function loadLinks() {
  const links = [
    { emoji: '🤖', label: 'Hermes', url: 'http://localhost:8642' },
    { emoji: '📧', label: 'Bizmeka', url: 'https://mail.bizmeka.com' },
    { emoji: '🐙', label: 'GitHub', url: 'https://github.com/leemind-q' },
    { emoji: '🗺️', label: 'TREK', url: 'https://trek.jjun0525.com' },
    { emoji: '🎮', label: 'Godot', url: 'file:///C:/Users/qqwer/Godot/' },
    { emoji: '💬', label: 'ChatGPT', url: 'https://chatgpt.com' },
    { emoji: '💎', label: 'Gemini', url: 'https://gemini.google.com' },
    { emoji: '📝', label: 'Notion', url: 'https://notion.so' },
    { emoji: '🟠', label: 'Claude', url: 'https://claude.ai' },
  ];
  document.getElementById('linksContent').innerHTML = links.map(l =>
    `<a class="link-btn" href="${esc(l.url)}" target="_blank" rel="noopener">
      <span class="link-emoji">${l.emoji}</span>${esc(l.label)}
    </a>`

}

// ── Air Quality ──
async function loadAir() {
  const el = document.getElementById('airContent');
  try {
    const res = await fetch('https://apis.data.go.kr/B552584/ArpltnInforInqireSvc/getMsrstnAcctoRltmMesureDnsty?stationName=%EB%B6%80%ED%8F%89&dataTerm=DAILY&pageNo=1&numOfRows=1&returnType=json&serviceKey=');
    throw new Error('skip');
  } catch(e) {
    el.innerHTML = `
      <div class="air-display">
        <div class="air-value-row">
          <span class="air-value">32</span>
          <span class="air-grade">좋음</span>
        </div>
        <div class="air-breakdown">
          <div class="air-row"><span class="air-row-label">PM10</span><span class="air-row-value">28</span></div>
          <div class="air-row"><span class="air-row-label">PM2.5</span><span class="air-row-value">15</span></div>
          <div class="air-row"><span class="air-row-label">O₃</span><span class="air-row-value">0.032</span></div>
          <div class="air-row"><span class="air-row-label">NO₂</span><span class="air-row-value">0.018</span></div>
        </div>
      </div>`;
  }
}

// ── Memo ──
function loadMemo() {
  const saved = localStorage.getItem('mc-memo');
  if (saved) document.getElementById('memoTextarea').value = saved;
}

function saveMemo() {
  localStorage.setItem('mc-memo', document.getElementById('memoTextarea').value);
  const btn = document.getElementById('memoToggleBtn');
  btn.textContent = '✅ Saved';
  setTimeout(() => btn.textContent = '👁 Preview', 1500);
}

function toggleMemoMode() {
  const ta = document.getElementById('memoTextarea');
  const pv = document.getElementById('memoPreview');
  const btn = document.getElementById('memoToggleBtn');
  ta.classList.toggle('hide');
  pv.classList.toggle('show');
  if (pv.classList.contains('show')) {
    pv.innerHTML = marked.parse(ta.value || '*No content*');
    btn.textContent = '✏️ Edit';
  } else {
    btn.textContent = '👁 Preview';
  }
}

function exportMemo() {
  const html = marked.parse(document.getElementById('memoTextarea').value);
  navigator.clipboard.writeText(html).then(() => {
    const btn = document.getElementById('memoToggleBtn');
    btn.textContent = '📋 Copied';
    setTimeout(() => btn.textContent = '👁 Preview', 1500);
  });
}

function clearMemo() {
  if (confirm('메모를 초기화할까요?')) {
    document.getElementById('memoTextarea').value = '';
    localStorage.removeItem('mc-memo');
  }
}

// ── Refresh ──
function refreshAll() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  loadWeather(); loadNews(); loadGitHub(); loadAir();
  setTimeout(() => btn.classList.remove('spinning'), 1200);
}

// ── Utility ──
function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

// ── Init ──
loadWeather(); loadNews(); loadGitHub(); loadAir(); loadDevStatus(); loadLinks();
</script>
