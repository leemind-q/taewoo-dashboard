/* вФАвФА Design Tokens вФАвФА */
:root {
  --bg-primary: #08080c;
  --bg-secondary: #0e0e14;
  --bg-tertiary: #141420;
  --bg-glass: rgba(14, 14, 22, 0.65);
  --bg-glass-elevated: rgba(20, 20, 30, 0.75);
  --bg-glass-deep: rgba(10, 10, 16, 0.85);

  --border-subtle: rgba(255,255,255,0.05);
  --border-default: rgba(255,255,255,0.08);
  --border-hover: rgba(255,255,255,0.15);
  --border-accent: rgba(255,255,255,0.12);

  --text-primary: #f5f5f7;
  --text-secondary: rgba(255,255,255,0.55);
  --text-tertiary: rgba(255,255,255,0.32);
  --text-quaternary: rgba(255,255,255,0.16);

  /* Section accent colors */
  --accent-amber: #f59e0b;
  --accent-amber-dim: rgba(245,158,11,0.10);
  --accent-amber-glow: rgba(245,158,11,0.06);

  --accent-blue: #3b82f6;
  --accent-blue-dim: rgba(59,130,246,0.10);
  --accent-blue-glow: rgba(59,130,246,0.06);

  --accent-purple: #8b5cf6;
  --accent-purple-dim: rgba(139,92,246,0.10);
  --accent-purple-glow: rgba(139,92,246,0.06);

  --accent-emerald: #10b981;
  --accent-emerald-dim: rgba(16,185,129,0.10);
  --accent-emerald-glow: rgba(16,185,129,0.06);

  --accent-rose: #f43f5e;
  --accent-rose-dim: rgba(244,63,94,0.10);
  --accent-rose-glow: rgba(244,63,94,0.06);

  --accent-orange: #f97316;
  --accent-orange-dim: rgba(249,115,22,0.10);
  --accent-orange-glow: rgba(249,115,22,0.06);

  --font-display: 'Space Grotesk', -apple-system, sans-serif;
  --font-body: 'DM Sans', -apple-system, sans-serif;

  --radius-2xl: 20px;
  --radius-xl: 16px;
  --radius-lg: 12px;
  --radius-md: 8px;
  --radius-sm: 6px;
  --radius-full: 9999px;

  --shadow-xs: 0 1px 2px rgba(0,0,0,0.6);
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.5);
  --shadow-md: 0 4px 20px rgba(0,0,0,0.45);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.55);
  --shadow-xl: 0 20px 60px rgba(0,0,0,0.6);
  --shadow-inner: inset 0 1px 0 rgba(255,255,255,0.03);
  --shadow-glow-amber: 0 0 30px rgba(245,158,11,0.08), 0 4px 16px rgba(0,0,0,0.4);
  --shadow-glow-blue: 0 0 30px rgba(59,130,246,0.08), 0 4px 16px rgba(0,0,0,0.4);
  --shadow-glow-purple: 0 0 30px rgba(139,92,246,0.08), 0 4px 16px rgba(0,0,0,0.4);
  --shadow-glow-emerald: 0 0 30px rgba(16,185,129,0.08), 0 4px 16px rgba(0,0,0,0.4);

  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --duration: 0.3s;
  --duration-slow: 0.5s;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html {
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}

body {
  font-family: var(--font-body);
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  line-height: 1.5;
}

/* вФАвФА Ambient glow background (quad source вАФ purple/amber/blue/emerald) вФАвФА */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  background:
    radial-gradient(ellipse 60% 40% at 20% 0%, rgba(139,92,246,0.07), transparent 50%),
    radial-gradient(ellipse 50% 35% at 80% 5%, rgba(245,158,11,0.06), transparent 45%),
    radial-gradient(ellipse 40% 30% at 90% 85%, rgba(59,130,246,0.04), transparent 45%),
    radial-gradient(ellipse 35% 25% at 5% 70%, rgba(16,185,129,0.03), transparent 40%);
}

/* вФАвФА Noise/grain texture overlay вФАвФА */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  opacity: 0.45;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.8'/%3E%3C/svg%3E");
  background-repeat: repeat;
  background-size: 200px 200px;
  mix-blend-mode: soft-light;
}

/* вФАвФА Layout вФАвФА */
.page {
  position: relative;
  z-index: 1;
  max-width: 1440px;
  margin: 0 auto;
  padding: 36px 44px 56px;
}

/* вФАвФА Top Bar вФАвФА */
.topbar {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 32px;
}

.logo {
  font-family: var(--font-display);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.3em;
  color: var(--text-quaternary);
  text-transform: uppercase;
  flex-shrink: 0;
}

.logo-dot {
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent-amber);
  margin-right: 10px;
  vertical-align: middle;
  box-shadow: 0 0 12px rgba(245,158,11,0.5);
}

.nav-pills {
  display: flex;
  gap: 4px;
  margin-left: 12px;
}

.nav-pill {
  padding: 8px 20px;
  border: none;
  border-radius: var(--radius-full);
  background: transparent;
  color: var(--text-quaternary);
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--duration) var(--ease-out);
  letter-spacing: 0.02em;
  position: relative;
  overflow: hidden;
}

.nav-pill:hover { color: var(--text-secondary); background: rgba(255,255,255,0.03); }

.nav-pill.active {
  color: var(--accent-amber);
  background: var(--accent-amber-dim);
  box-shadow:
    0 0 28px rgba(245, 158, 11, 0.06),
    inset 0 1px 0 rgba(245, 158, 11, 0.1);
}

.nav-pill::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at center, rgba(255,255,255,0.04), transparent 70%);
  opacity: 0;
  transition: opacity var(--duration) var(--ease-out);
  pointer-events: none;
}
.nav-pill:hover::after { opacity: 1; }

.topbar-actions {
  margin-left: auto;
  display: flex;
  gap: 8px;
}

.btn-icon {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 40px; height: 40px;
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  background: var(--bg-glass);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  color: var(--text-quaternary);
  cursor: pointer;
  transition: all var(--duration) var(--ease-out);
}
.btn-icon:hover { color: var(--text-secondary); background: rgba(255,255,255,0.05); border-color: var(--border-hover); }
.btn-icon:active { transform: scale(0.95); }
.btn-icon svg { width: 16px; height: 16px; }
.btn-icon.spinning svg { animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* вФАвФА Bento Grid вФАвФА */
.bento {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  grid-auto-rows: min-content;
  gap: 20px;
  opacity: 0;
  animation: bentoFadeIn 0.6s var(--ease-out) forwards;
}

@keyframes bentoFadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

.col-12 { grid-column: span 12; }
.col-8  { grid-column: span 8; }
.col-6  { grid-column: span 6; }
.col-4  { grid-column: span 4; }

/* вФАвФА Premium Card System with Hierarchy вФАвФА */
.card {
  background: var(--bg-glass);
  backdrop-filter: blur(20px) saturate(150%);
  -webkit-backdrop-filter: blur(20px) saturate(150%);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-xl);
  overflow: hidden;
  transition:
    border-color var(--duration) var(--ease-out),
    transform var(--duration) var(--ease-out),
    box-shadow var(--duration) var(--ease-out);
  position: relative;
  box-shadow: var(--shadow-inner), var(--shadow-sm);
  animation: cardIn 0.55s var(--ease-out) both;
}

/* Top highlight line */
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg,
    transparent 5%,
    rgba(255,255,255,0.06) 20%,
    rgba(255,255,255,0.06) 80%,
    transparent 95%);
  z-index: 2;
  pointer-events: none;
}

/* Card hierarchy: elevated cards get stronger glow */
.card--elevated {
  background: var(--bg-glass-elevated);
  border-color: var(--border-default);
  box-shadow: var(--shadow-inner), var(--shadow-md);
}

.card--elevated:hover {
  box-shadow: var(--shadow-inner), var(--shadow-lg);
}

/* Accent-glow cards: per-section color glow */
.card--glow-amber { box-shadow: var(--shadow-glow-amber); }
.card--glow-blue  { box-shadow: var(--shadow-glow-blue); }
.card--glow-purple { box-shadow: var(--shadow-glow-purple); }
.card--glow-emerald { box-shadow: var(--shadow-glow-emerald); }

.card:hover {
  border-color: var(--border-hover);
  transform: translateY(-2px);
  box-shadow: var(--shadow-inner), var(--shadow-lg);
}

.card:nth-child(1) { animation-delay: 0.00s; }
.card:nth-child(2) { animation-delay: 0.06s; }
.card:nth-child(3) { animation-delay: 0.12s; }
.card:nth-child(4) { animation-delay: 0.18s; }
.card:nth-child(5) { animation-delay: 0.24s; }
.card:nth-child(6) { animation-delay: 0.30s; }
.card:nth-child(7) { animation-delay: 0.36s; }
.card:nth-child(8) { animation-delay: 0.42s; }
.card:nth-child(9) { animation-delay: 0.48s; }

@keyframes cardIn {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

.card-body {
  padding: 28px;
  position: relative;
  z-index: 1;
}

.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 22px;
}

.card-label {
  font-family: var(--font-body);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.14em;
  color: var(--text-quaternary);
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 8px;
}

.label-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
  box-shadow: 0 0 10px currentColor;
}

/* вФАвФА Search вФАвФА */
.search-card { background: var(--bg-glass-deep); }
.search-card .card-body { padding: 18px 24px; }

.search-row {
  display: flex;
  align-items: center;
  gap: 14px;
}

.search-icon-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 44px; height: 44px;
  border-radius: var(--radius-lg);
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border-subtle);
  flex-shrink: 0;
}
.search-icon-wrap svg { width: 18px; height: 18px; color: var(--text-tertiary); }

.search-input {
  flex: 1;
  border: none;
  background: transparent;
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 15px;
  outline: none;
  letter-spacing: 0.01em;
}
.search-input::placeholder { color: var(--text-quaternary); }

.search-engine-pills {
  display: flex;
  gap: 4px;
  flex-shrink: 0;
}

.engine-pill {
  padding: 6px 16px;
  border: none;
  border-radius: var(--radius-full);
  background: transparent;
  color: var(--text-quaternary);
  font-family: var(--font-body);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--duration) var(--ease-out);
}
.engine-pill:hover { color: var(--text-tertiary); background: rgba(255,255,255,0.03); }
.engine-pill.active { color: var(--accent-amber); background: var(--accent-amber-dim); }

/* вФАвФА Clock (AMBER accent, largest card) вФАвФА */
.clock-card .card-body { padding: 36px 40px; }

.clock-time {
  font-family: var(--font-display);
  font-weight: 300;
  font-size: 80px;
  line-height: 1;
  letter-spacing: -0.04em;
  color: var(--text-primary);
  font-variant-numeric: tabular-nums;
}

.clock-seconds {
  font-size: 32px;
  font-weight: 300;
  color: var(--accent-amber);
  opacity: 0.5;
  vertical-align: super;
  margin-left: 4px;
}

.clock-date {
  font-size: 15px;
  color: var(--text-secondary);
  margin-top: 10px;
  font-weight: 400;
}

.clock-greeting {
  font-size: 14px;
  color: var(--accent-amber);
  opacity: 0.7;
  margin-top: 6px;
  font-weight: 500;
}

/* вФАвФА Weather (BLUE accent) вФАвФА */
.weather-card .card-body { padding: 28px 32px; }

.weather-layout {
  display: flex;
  gap: 24px;
  align-items: flex-start;
}

.weather-main { flex: 1; }

.weather-temp-row {
  display: flex;
  align-items: flex-start;
  gap: 14px;
}

.weather-temp {
  font-family: var(--font-display);
  font-weight: 300;
  font-size: 60px;
  line-height: 1;
  letter-spacing: -0.02em;
  color: var(--text-primary);
}

.weather-icon-text { font-size: 36px; line-height: 1.2; }

.weather-desc {
  font-size: 14px;
  color: var(--text-secondary);
  margin-top: 6px;
}

.weather-detail-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-top: 18px;
}

.weather-detail {
  background: rgba(10, 10, 16, 0.5);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-radius: var(--radius-md);
  padding: 12px 14px;
  border: 1px solid var(--border-subtle);
}

.weather-detail-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  color: var(--text-quaternary);
  text-transform: uppercase;
}

.weather-detail-value {
  font-family: var(--font-display);
  font-size: 16px;
  font-weight: 500;
  color: var(--text-primary);
  margin-top: 3px;
}

.weather-forecast {
  display: flex;
  flex-direction: column;
  gap: 6px;
  flex-shrink: 0;
  min-width: 105px;
}

.forecast-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  background: rgba(10, 10, 16, 0.5);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-radius: var(--radius-md);
  font-size: 12px;
  color: var(--text-secondary);
  border: 1px solid var(--border-subtle);
}
.forecast-item .day { color: var(--text-tertiary); font-weight: 500; }
.forecast-item .hi-lo { font-family: var(--font-display); font-weight: 500; color: var(--text-primary); }

/* вФАвФА News (ORANGE accent, with category pills) вФАвФА */
.news-card .card-body { padding: 24px 28px; }

.news-tabs {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--border-subtle);
  margin-bottom: 18px;
  margin-left: -28px;
  margin-right: -28px;
  padding: 0 28px;
}

.news-tab {
  padding: 12px 22px;
  border: none;
  border-bottom: 2px solid transparent;
  background: none;
  color: var(--text-tertiary);
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--duration) var(--ease-out);
  margin-bottom: -1px;
}
.news-tab:hover { color: var(--text-secondary); }
.news-tab.active {
  color: var(--accent-orange);
  border-bottom-color: var(--accent-orange);
}

.news-list { display: flex; flex-direction: column; gap: 3px; }

.news-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 16px;
  border-radius: var(--radius-lg);
  text-decoration: none;
  color: inherit;
  transition: all var(--duration) var(--ease-out);
}

.news-item:hover {
  background: rgba(255,255,255,0.04);
  transform: translateX(4px);
}

.news-item:hover .news-title { color: var(--accent-orange); }

/* Category pill badge */
.news-pill {
  flex-shrink: 0;
  padding: 3px 10px;
  border-radius: var(--radius-full);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.news-pill--it     { background: var(--accent-blue-dim); color: var(--accent-blue); }
.news-pill--ai     { background: var(--accent-purple-dim); color: var(--accent-purple); }
.news-pill--semi   { background: var(--accent-amber-dim); color: var(--accent-amber); }
.news-pill--social { background: var(--accent-emerald-dim); color: var(--accent-emerald); }
.news-pill--default { background: rgba(255,255,255,0.06); color: var(--text-secondary); }

.news-body { flex: 1; min-width: 0; }

.news-title {
  font-size: 14px;
  font-weight: 400;
  color: var(--text-primary);
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  transition: color var(--duration) var(--ease-out);
}

.news-source {
  font-size: 11px;
  color: var(--text-quaternary);
  margin-top: 4px;
}

/* вФАвФА GitHub (neutral tertiary) вФАвФА */
.github-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

.github-stat {
  background: rgba(10, 10, 16, 0.5);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-radius: var(--radius-lg);
  padding: 18px 16px;
  text-align: center;
  border: 1px solid var(--border-subtle);
  transition: all var(--duration) var(--ease-out);
}
.github-stat:hover { border-color: var(--border-default); background: rgba(255,255,255,0.03); }

.github-stat-value {
  font-family: var(--font-display);
  font-size: 26px;
  font-weight: 600;
  color: var(--text-primary);
  font-variant-numeric: tabular-nums;
}

.github-stat-label {
  font-size: 11px;
  color: var(--text-quaternary);
  font-weight: 500;
  margin-top: 4px;
  letter-spacing: 0.04em;
}

.github-repos {
  margin-top: 14px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.github-repo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;

function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('clockDisplay').innerHTML = `${h}:${m}<span class="clock-seconds">${s}</span>`;
  const days = ['мЭЉмЪФмЭЉ','мЫФмЪФмЭЉ','нЩФмЪФмЭЉ','мИШмЪФмЭЉ','л™©мЪФмЭЉ','кЄИмЪФмЭЉ','нЖ†мЪФмЭЉ'];
  document.getElementById('dateDisplay').textContent =

let newsData = { categories: {} };
let activeNewsCat = 'IT';

async function loadNews() {
  try {
    const res = await fetch('news.json?_=' + Date.now());
    if (res.ok) newsData = await res.json();
  } catch(e) {}
  renderNews();
}

function renderNews() {
  const tabsEl = document.getElementById('newsTabs');
  const contentEl = document.getElementById('newsContent');
  const cats = Object.keys(newsData.categories || {});
  if (newsData.updated) document.getElementById('newsUpdated').textContent = newsData.updated;
  if (cats.length === 0) {
    contentEl.innerHTML = '<div style="color:var(--text-quaternary);font-size:13px;padding:16px 0;">лЙімК§л•Љ лґИлЯђмШђ мИШ мЧЖмКµлЛИлЛ§</div>';
    tabsEl.innerHTML = '';
    return;
  }
  tabsEl.innerHTML = cats.map(c => `<button class="news-tab ${c===activeNewsCat?'active':''}" onclick="switchNews('${c}')">${c}</button>`).join('');
  const articles = newsData.categories[activeNewsCat] || [];
  contentEl.innerHTML = `<div class="news-list">${articles.map((a,i) => {
    const src = a.source || '';
    const pillClass = getPillClass(activeNewsCat);
    return `<a class="news-item" href="${esc(a.link)}" target="_blank" rel="noopener">
      <span class="${pillClass}">${esc(activeNewsCat)}</span>
      <div class="news-body"><div class="news-title">${esc(a.title)}</div>${src ? `<div class="news-source">${esc(src)}</div>` : ''}</div>
    </a>`;
  }).join('')}</div>`;
}
function switchNews(cat) { activeNewsCat = cat; renderNews(); }

function loadMemo() {
  const saved = localStorage.getItem('mc-memo');
  if (saved) document.getElementById('memoTextarea').value = saved;
}

function saveMemo() {
  localStorage.setItem('mc-memo', document.getElementById('memoTextarea').value);
  const btn = document.getElementById('memoToggleBtn');
  btn.textContent = 'вЬЕ Saved';
  setTimeout(() => btn.textContent = 'рЯСБ Preview', 1500);
}

function toggleMemoMode() {
  const ta = document.getElementById('memoTextarea');
  const pv = document.getElementById('memoPreview');
  const btn = document.getElementById('memoToggleBtn');
  ta.classList.toggle('hide');
  pv.classList.toggle('show');
  if (pv.classList.contains('show')) {
    pv.innerHTML = marked.parse(ta.value || '*No content*');
    btn.textContent = 'вЬПпЄП Edit';
  } else {
    btn.textContent = 'рЯСБ Preview';
  }
}

function exportMemo() {
  const html = marked.parse(document.getElementById('memoTextarea').value);
  navigator.clipboard.writeText(html).then(() => {
    const btn = document.getElementById('memoToggleBtn');
    btn.textContent = 'рЯУЛ Copied';
    setTimeout(() => btn.textContent = 'рЯСБ Preview', 1500);
  });
}

function clearMemo() {
  if (confirm('л©Фл™®л•Љ міИкЄ∞нЩФнХ†кєМмЪФ?')) {
    document.getElementById('memoTextarea').value = '';

}
