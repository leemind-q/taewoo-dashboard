<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mission Control — taewoo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@200;300;400;500;600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
/* ═══════════════════════════════════════════════════════════════
   MISSION CONTROL v5 — "화사하고 지적인 프리미엄 AI 비서"
   Base: Soft Navy Gradient + 3 Accents (Amber/Sky/Lavender)
   Ref: Apple Smart Stack · Toss · Notion Calendar
   ═══════════════════════════════════════════════════════════════ */

:root {
  /* ── Base (no pure black) ── */
  --bg-base-1: #1c1f2e;   /* top of gradient */
  --bg-base-2: #232740;   /* mid */
  --bg-base-3: #1a1d2c;   /* bottom (slightly darker) */

  /* ── Card surfaces (one tone above base) ── */
  --card-bg:        #2a2e42;
  --card-bg-hi:     #2f3450;
  --card-bg-deep:   #262a3c;
  --card-border-top:rgba(255,255,255,0.10);
  --card-border:    rgba(255,255,255,0.06);

  /* ── Text (raised contrast vs v4: +25%) ── */
  --text-primary:   #f3f4fa;  /* brighter than f5f5f7 */
  --text-secondary: rgba(243,244,250,0.68);
  --text-tertiary:  rgba(243,244,250,0.45);
  --text-quat:      rgba(243,244,250,0.30);
  --text-disabled:  rgba(243,244,250,0.18);

  /* ── 3 Accent system (soft, low-chroma) ── */
  --accent-amber:   #f2a65a;   /* Clock / Timezone */
  --accent-amber-soft: rgba(242,166,90,0.14);
  --accent-amber-glow: rgba(242,166,90,0.18);
  --accent-amber-border: rgba(242,166,90,0.30);

  --accent-sky:     #8ab4f8;   /* Weather */
  --accent-sky-soft: rgba(138,180,248,0.14);
  --accent-sky-glow: rgba(138,180,248,0.18);
  --accent-sky-border: rgba(138,180,248,0.30);

  --accent-lavender: #b39ddb;  /* Today's Summary / Tasks */
  --accent-lav-soft: rgba(179,157,219,0.14);
  --accent-lav-glow: rgba(179,157,219,0.20);
  --accent-lav-border: rgba(179,157,219,0.32);

  /* news accents — derived from same calm palette */
  --accent-rose-soft: rgba(242,166,166,0.14);
  --accent-rose:     #f2a6a6;
  --accent-mint:     #a6d8c2;
  --accent-mint-soft:rgba(166,216,194,0.14);

  /* ── Typography ── */
  --font-display: 'Space Grotesk', -apple-system, sans-serif;
  --font-body:    'DM Sans', -apple-system, sans-serif;

  /* ── Radii (wider than v4) ── */
  --r-card:    24px;   /* ↑ from 16 */
  --r-card-lg: 28px;   /* hero cards */
  --r-inner:   16px;   /* nested */
  --r-sm:      10px;
  --r-full:    9999px;

  /* ── Shadow (soft, not neon) ── */
  --sh-1: 0 1px 2px rgba(0,0,0,0.30);
  --sh-2: 0 4px 12px rgba(8,10,20,0.40);
  --sh-3: 0 12px 40px rgba(8,10,20,0.55);
  --sh-4: 0 24px 56px rgba(8,10,20,0.65);
  --sh-amber: 0 8px 28px rgba(242,166,90,0.10), 0 2px 8px rgba(0,0,0,0.25);
  --sh-sky:   0 8px 28px rgba(138,180,248,0.10), 0 2px 8px rgba(0,0,0,0.25);
  --sh-lav:   0 8px 28px rgba(179,157,219,0.12), 0 2px 8px rgba(0,0,0,0.25);

  --ease: cubic-bezier(0.22, 1, 0.36, 1);
  --dur:  0.35s;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { font-size:16px; -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; }
body {
  font-family: var(--font-body);
  color: var(--text-primary);
  min-height: 100vh;
  line-height: 1.55;
  background:
    radial-gradient(1200px 600px at 20% -10%, rgba(138,180,248,0.10), transparent 55%),
    radial-gradient(900px 500px at 90% 10%,  rgba(242,166,90,0.08), transparent 50%),
    radial-gradient(800px 500px at 50% 100%, rgba(179,157,219,0.07), transparent 55%),
    linear-gradient(180deg, var(--bg-base-1) 0%, var(--bg-base-2) 45%, var(--bg-base-3) 100%);
  background-attachment: fixed;
  position: relative;
  overflow-x: hidden;
}

/* Subtle grain texture — material feel without neon */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  opacity: 0.55;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 240 240' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.55'/%3E%3C/svg%3E");
  background-size: 240px 240px;
  mix-blend-mode: overlay;
}

/* Faint vignette for focus */
body::after {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background: radial-gradient(ellipse 110% 80% at 50% 50%, transparent 55%, rgba(0,0,0,0.20) 100%);
}

/* ── Page Layout ── */
.page {
  position: relative; z-index: 1;
  max-width: 1480px;
  margin: 0 auto;
  padding: 48px 56px 64px;
}

/* ── Top Bar ── */
.topbar {
  display: flex; align-items: center;
  gap: 20px; margin-bottom: 36px;
}
.brand {
  display: flex; align-items: center; gap: 12px;
  font-family: var(--font-display);
  font-weight: 500; font-size: 15px;
  letter-spacing: 0.02em;
  color: var(--text-primary);
}
.brand-mark {
  width: 32px; height: 32px;
  border-radius: 10px;
  background: linear-gradient(135deg, var(--accent-amber) 0%, var(--accent-lavender) 100%);
  display: flex; align-items: center; justify-content: center;
  color: #1c1f2e; font-weight: 600; font-size: 14px;
  box-shadow: 0 4px 16px rgba(179,157,219,0.25);
}
.brand-meta {
  font-size: 11px;
  color: var(--text-tertiary);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-top: 2px;
}

.nav-pills { display: flex; gap: 4px; margin-left: 16px; }
.nav-pill {
  padding: 9px 22px; border: none; border-radius: var(--r-full);
  background: transparent;
  color: var(--text-tertiary);
  font-family: var(--font-body); font-size: 13px; font-weight: 500;
  letter-spacing: 0.01em;
  cursor: pointer; transition: all 220ms var(--ease);
}
.nav-pill:hover { color: var(--text-secondary); background: rgba(255,255,255,0.04); }
.nav-pill.active {
  color: var(--text-primary);
  background: var(--card-bg-hi);
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.10), 0 2px 8px rgba(0,0,0,0.20);
}

.topbar-actions { margin-left: auto; display: flex; gap: 10px; }
.btn-icon {
  display: flex; align-items: center; justify-content: center;
  width: 42px; height: 42px;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 14px;
  background: var(--card-bg);
  color: var(--text-tertiary);
  cursor: pointer; transition: all 220ms var(--ease);
  backdrop-filter: blur(12px);
}
.btn-icon:hover { color: var(--text-primary); background: var(--card-bg-hi); border-color: rgba(255,255,255,0.14); }
.btn-icon:active { transform: scale(0.96); }
.btn-icon svg { width: 16px; height: 16px; }
.btn-icon.spin svg { animation: spin 1.1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Bento Grid ── */
.bento {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  grid-auto-rows: min-content;
  gap: 22px;
}
.col-12 { grid-column: span 12; }
.col-8  { grid-column: span 8; }
.col-6  { grid-column: span 6; }
.col-5  { grid-column: span 5; }
.col-4  { grid-column: span 4; }
.col-3  { grid-column: span 3; }

/* ── Card system (wider padding, soft gradient border) ── */
.card {
  position: relative;
  background: var(--card-bg);
  border-radius: var(--r-card);
  overflow: hidden;
  box-shadow: var(--sh-2);
  transition: transform 350ms var(--ease), box-shadow 350ms var(--ease), background 220ms var(--ease);
  animation: cardIn 600ms var(--ease) both;
}

/* Gradient border via pseudo (1px top brighter, rest subtle) */
.card::before {
  content: '';
  position: absolute; inset: 0;
  border-radius: inherit;
  padding: 1px;
  background: linear-gradient(180deg,
    var(--card-border-top) 0%,
    rgba(255,255,255,0.04) 30%,
    var(--card-border) 100%);
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
          mask-composite: exclude;
  pointer-events: none;
  z-index: 2;
}

/* Subtle inner highlight for material feel */
.card::after {
  content: '';
  position: absolute; inset: 0;
  border-radius: inherit;
  background: linear-gradient(180deg, rgba(255,255,255,0.04) 0%, transparent 30%);
  pointer-events: none;
  z-index: 1;
}

.card:hover {
  transform: translateY(-4px);
  box-shadow: var(--sh-3);
  background: var(--card-bg-hi);
}
.card:hover::before {
  background: linear-gradient(180deg,
    rgba(255,255,255,0.18) 0%,
    rgba(255,255,255,0.06) 30%,
    rgba(255,255,255,0.10) 100%);
}

/* Card variants by accent */
.card--amber  { box-shadow: var(--sh-2); }
.card--amber:hover { box-shadow: var(--sh-amber); }
.card--sky    { box-shadow: var(--sh-2); }
.card--sky:hover   { box-shadow: var(--sh-sky); }
.card--lav    { box-shadow: var(--sh-2); }
.card--lav:hover   { box-shadow: var(--sh-lav); }

@keyframes cardIn {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}
.card:nth-child(1){ animation-delay: 0.00s; }
.card:nth-child(2){ animation-delay: 0.05s; }
.card:nth-child(3){ animation-delay: 0.10s; }
.card:nth-child(4){ animation-delay: 0.15s; }
.card:nth-child(5){ animation-delay: 0.20s; }
.card:nth-child(6){ animation-delay: 0.25s; }
.card:nth-child(7){ animation-delay: 0.30s; }
.card:nth-child(8){ animation-delay: 0.35s; }

.card-body {
  position: relative; z-index: 3;
  padding: 36px 36px;   /* ↑ 1.5x from 28 */
}

/* Card header */
.card-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px;
}
.card-label {
  display: flex; align-items: center; gap: 10px;
  font-size: 12px; font-weight: 500;
  letter-spacing: 0.14em;
  color: var(--text-tertiary);
  text-transform: uppercase;
}
.label-dot {
  width: 6px; height: 6px; border-radius: 50%;
  flex-shrink: 0;
}

/* ── Search Bar (search bar takes full width, slim) ── */
.search-card { background: var(--card-bg-deep); }
.search-card .card-body { padding: 18px 24px; }
.search-row { display: flex; align-items: center; gap: 16px; }
.search-icon-wrap {
  width: 40px; height: 40px;
  border-radius: 12px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.search-icon-wrap svg { width: 16px; height: 16px; color: var(--text-tertiary); }
.search-input {
  flex: 1; border: none; background: transparent; outline: none;
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 15px;
  font-weight: 400;
  letter-spacing: 0.005em;
}
.search-input::placeholder { color: var(--text-quat); }
.search-engine-pills { display: flex; gap: 4px; flex-shrink: 0; }
.engine-pill {
  padding: 7px 16px; border: none; border-radius: var(--r-full);
  background: transparent;
  color: var(--text-tertiary);
  font-family: var(--font-body); font-size: 12px; font-weight: 500;
  cursor: pointer; transition: all 200ms var(--ease);
}
.engine-pill:hover { color: var(--text-secondary); background: rgba(255,255,255,0.04); }
.engine-pill.active {
  color: var(--text-primary);
  background: var(--accent-amber-soft);
  box-shadow: inset 0 0 0 1px var(--accent-amber-border);
}

/* ── Hero Greeting (full-width, contextual) ── */
.greet-card .card-body { padding: 36px 40px; }
.greet-row {
  display: flex; align-items: center; gap: 24px;
}
.greet-avatar {
  width: 64px; height: 64px;
  border-radius: 20px;
  background: linear-gradient(135deg,
    var(--accent-amber) 0%,
    var(--accent-sky) 50%,
    var(--accent-lavender) 100%);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 8px 24px rgba(138,180,248,0.20);
}
.greet-avatar svg { width: 30px; height: 30px; color: #1c1f2e; }
.greet-text { flex: 1; }
.greet-hi {
  font-size: 13px; font-weight: 500;
  color: var(--text-tertiary);
  letter-spacing: 0.10em;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.greet-briefing {
  font-family: var(--font-display);
  font-weight: 300;
  font-size: 22px;
  line-height: 1.45;
  letter-spacing: -0.005em;
  color: var(--text-primary);
  max-width: 820px;
}
.greet-briefing em {
  font-style: normal;
  color: var(--accent-amber);
  font-weight: 400;
}
.greet-briefing .sky { color: var(--accent-sky); font-weight: 400; }
.greet-briefing .lav { color: var(--accent-lavender); font-weight: 400; }
.greet-meta {
  display: flex; align-items: center; gap: 18px;
  margin-top: 14px;
  font-size: 12px;
  color: var(--text-quat);
  font-variant-numeric: tabular-nums;
}
.greet-meta-item { display: flex; align-items: center; gap: 6px; }
.greet-meta-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--text-quat); }

/* ── Clock (AMBER) ── */
.clock-card.card--amber .card-body { padding: 40px 40px; }
.clock-time {
  font-family: var(--font-display);
  font-weight: 200;          /* thin per request */
  font-size: 92px;
  line-height: 1;
  letter-spacing: -0.03em;
  color: var(--text-primary);
  font-variant-numeric: tabular-nums;
  display: flex; align-items: baseline;
}
.clock-hm { display: inline-block; }
.clock-secs {
  font-size: 36px;
  font-weight: 200;
  color: var(--accent-amber);
  opacity: 0.85;
  margin-left: 8px;
  display: inline-block;
  min-width: 64px;
  transition: opacity 280ms var(--ease), transform 280ms var(--ease);
}
.clock-secs.tick {
  opacity: 0.30;
  transform: translateY(-3px);
}
.clock-date {
  font-size: 15px;
  color: var(--text-secondary);
  margin-top: 14px;
  font-weight: 400;
  letter-spacing: 0.01em;
}
.clock-tz {
  display: inline-flex; align-items: center; gap: 6px;
  margin-top: 12px;
  padding: 6px 14px;
  border-radius: var(--r-full);
  background: var(--accent-amber-soft);
  color: var(--accent-amber);
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.04em;
}
.clock-tz .label-dot { background: var(--accent-amber); box-shadow: 0 0 8px var(--accent-amber-glow); }

/* ── Weather (SKY) ── */
.weather-card.card--sky .card-body { padding: 32px 36px; }
.weather-layout { display: flex; gap: 28px; align-items: stretch; }
.weather-main { flex: 1; min-width: 0; }
.weather-temp-row { display: flex; align-items: flex-start; gap: 16px; }
.weather-temp {
  font-family: var(--font-display);
  font-weight: 200;
  font-size: 68px;
  line-height: 1;
  letter-spacing: -0.02em;
  color: var(--text-primary);
}
.weather-icon-text { font-size: 40px; line-height: 1.1; }
.weather-desc {
  font-size: 14px;
  color: var(--text-secondary);
  margin-top: 10px;
}
.weather-detail-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 10px; margin-top: 22px;
}
.weather-detail {
  background: rgba(255,255,255,0.03);
  border-radius: var(--r-inner);
  padding: 14px 16px;
  border: 1px solid rgba(255,255,255,0.05);
}
.weather-detail-label {
  font-size: 10px; font-weight: 500;
  letter-spacing: 0.10em; text-transform: uppercase;
  color: var(--text-quat);
}
.weather-detail-value {
  font-family: var(--font-display);
  font-size: 18px; font-weight: 400;
  color: var(--text-primary);
  margin-top: 4px;
  font-variant-numeric: tabular-nums;
}
.weather-forecast {
  display: flex; flex-direction: column; gap: 8px;
  flex-shrink: 0; min-width: 130px;
}
.forecast-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px;
  background: rgba(255,255,255,0.03);
  border-radius: var(--r-inner);
  font-size: 13px; color: var(--text-secondary);
  border: 1px solid rgba(255,255,255,0.05);
}
.forecast-item .day { color: var(--text-tertiary); font-weight: 500; }
.forecast-item .hi-lo {
  font-family: var(--font-display); font-weight: 400;
  color: var(--text-primary);
  font-variant-numeric: tabular-nums;
}

/* ── Today's Summary (LAVENDER) — 3-tier structure ── */
.summary-card.card--lav .card-body { padding: 32px 36px; }
.summary-tiers { display: flex; flex-direction: column; gap: 14px; }

.tier {
  position: relative;
  display: flex; align-items: center; gap: 16px;
  padding: 18px 20px;
  background: rgba(255,255,255,0.03);
  border-radius: var(--r-inner);
  border: 1px solid rgba(255,255,255,0.05);
  transition: background 220ms var(--ease);
}
.tier:hover { background: rgba(179,157,219,0.06); border-color: rgba(179,157,219,0.14); }

.tier-marker {
  width: 4px; height: 38px; border-radius: 4px;
  flex-shrink: 0;
}
.tier-urgent .tier-marker { background: var(--accent-amber); box-shadow: 0 0 10px var(--accent-amber-glow); }
.tier-next   .tier-marker { background: var(--accent-sky);   box-shadow: 0 0 10px var(--accent-sky-glow); }
.tier-rest   .tier-marker { background: var(--accent-lavender); box-shadow: 0 0 10px var(--accent-lav-glow); }

.tier-body { flex: 1; min-width: 0; }
.tier-tag {
  display: inline-block;
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.10em; text-transform: uppercase;
  color: var(--text-tertiary);
  margin-bottom: 4px;
}
.tier-urgent .tier-tag { color: var(--accent-amber); }
.tier-next   .tier-tag { color: var(--accent-sky); }
.tier-rest   .tier-tag { color: var(--accent-lavender); }

.tier-title {
  font-size: 14px; font-weight: 500;
  color: var(--text-primary);
  line-height: 1.4;
}
.tier-meta {
  font-size: 12px; color: var(--text-quat);
  margin-top: 3px;
  font-variant-numeric: tabular-nums;
}

.tier-arrow {
  width: 24px; height: 24px;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-quat);
  flex-shrink: 0;
}
.tier-arrow svg { width: 14px; height: 14px; }
.tier-rest .tier-arrow { transition: transform 240ms var(--ease); }
.tier-rest.expanded .tier-arrow { transform: rotate(90deg); }
.tier-rest-items {
  max-height: 0; overflow: hidden;
  transition: max-height 320ms var(--ease);
  padding-left: 20px;
}
.tier-rest.expanded .tier-rest-items { max-height: 200px; padding-top: 10px; }
.tier-rest-items div {
  font-size: 12px; color: var(--text-tertiary);
  padding: 4px 0;
  border-top: 1px solid rgba(255,255,255,0.04);
}

/* ── News ── */
.news-card .card-body { padding: 28px 32px; }
.news-curation {
  font-size: 12px; color: var(--accent-lavender);
  margin-bottom: 16px;
  display: flex; align-items: center; gap: 8px;
  font-weight: 500;
}
.news-curation::before {
  content: ''; width: 4px; height: 4px; border-radius: 50%;
  background: var(--accent-lavender);
  box-shadow: 0 0 8px var(--accent-lav-glow);
}

.news-tabs {
  display: flex; gap: 0;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  margin: 0 -32px 18px;
  padding: 0 32px;
  position: relative;
}
.news-tab {
  padding: 12px 22px;
  border: none; background: none;
  color: var(--text-tertiary);
  font-family: var(--font-body); font-size: 13px; font-weight: 500;
  cursor: pointer;
  position: relative;
  transition: color 200ms var(--ease);
}
.news-tab:hover { color: var(--text-secondary); }
.news-tab.active { color: var(--text-primary); }
.news-tab::after {
  content: '';
  position: absolute;
  bottom: -1px; left: 22px; right: 22px;

<script>
/* ═══════════════════════════════════════════════════
   MISSION CONTROL v5 — Application Logic
   ═══════════════════════════════════════════════════ */

const CATEGORY_PILL_MAP = {
  'IT': 'it', 'AI': 'ai', '반도체': 'semi', '사회': 'social',
  '경제': 'semi', '정치': 'social', '스포츠': 'social',
  '연예': 'social', '과학': 'it', '기술': 'ai',
};
const getPillClass = (cat) => 'news-pill news-pill--' + (CATEGORY_PILL_MAP[cat] || 'default');

/* ── Context-aware briefing state (declared before clock which references it) ── */
const weatherCtx  = { desc: '맑음', temp: '25', feels: '27' };
const scheduleCtx = { urgent: '', urgentMeta: '', next: '', nextMeta: '', rest: [] };
const newsCtx     = { categories: {}, updated: '' };

function switchTab(tab) {
  document.getElementById('view-dashboard').style.display = tab === 'dashboard' ? '' : 'none';
  document.getElementById('view-memo').classList.toggle('active', tab === 'memo');
  document.getElementById('navDash').classList.toggle('active', tab === 'dashboard');
  document.getElementById('navMemo').classList.toggle('active', tab === 'memo');
  if (tab === 'memo') loadMemo();
}

/* ── Clock with smooth second-tick fade ── */
let lastSecs = '';
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('clockHM').textContent = `${h}:${m}`;
  const secsEl = document.getElementById('clockSecs');
  if (s !== lastSecs) {
    secsEl.classList.add('tick');
    setTimeout(() => {
      secsEl.textContent = s;
      secsEl.classList.remove('tick');
    }, 140);
    lastSecs = s;
  }
  const days = ['일','월','화','수','목','금','토'];
  document.getElementById('dateDisplay').textContent =
    `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')} ${days[now.getDay()]}요일`;

/* ── Context-aware briefing (assembled from latest data) ── */
function buildBriefing(now, w, s, n) {
  const h = now.getHours();
  let tod = h < 6 ? '새벽' : h < 11 ? '아침' : h < 14 ? '점심' : h < 18 ? '오후' : h < 22 ? '저녁' : '밤';
  let weatherFragment = '';
  const desc = w.desc || '맑음';
  // Tailored phrasing by weather type
  if (desc.includes('비'))      weatherFragment = `<span class="sky">${esc(desc)}</span> — 우산 챙기시면 좋겠어요.`;
  else if (desc.includes('눈')) weatherFragment = `<span class="sky">${esc(desc)}</span> — 따뜻하게 입으세요.`;
  else if (desc.includes('안개')) weatherFragment = `<span class="sky">${esc(desc)}</span> — 운전 조심하세요.`;
  else if (desc.includes('흐림') || desc.includes('구름')) weatherFragment = `<span class="sky">${esc(desc)}</span> — 선선한 하루예요.`;
  else if (desc.includes('맑') || desc.includes('화창')) weatherFragment = `<span class="sky">${esc(desc)}</span> — 기분 좋은 하루예요.`;
  else weatherFragment = `<span class="sky">${esc(desc)}</span>`;
  let schFragment = '';
  if (s.urgent) schFragment = `<em>${esc(s.urgent)}</em>(으)로 시작하는 하루예요.`;
  else if (s.next) schFragment = `다음 일정까지 <em>${esc(s.nextMeta)}</em> 여유가 있어요.`;
  else schFragment = `일정이 비어있는 ${tod}이에요.`;

  document.getElementById('greetBriefing').innerHTML =
    `안녕하세요, 태우님. ${tod}이에요. 오늘은 ${weatherFragment}이고, ${schFragment}`;
  document.getElementById('clockTz').textContent = `KST · ${tod}`;
}

async function loadWeather() {

    if (!res.ok) throw new Error('wttr ' + res.status);

    const cur = data.current_condition[0];

let newsData = { categories: {} };
let activeNewsCat = 'IT';

async function loadNews() {
  try {
    const res = await fetch('news.json?_=' + Date.now());
    if (res.ok) newsData = await res.json();
  } catch(e) {}
  newsCtx.categories = newsData.categories || {};
  newsCtx.updated = newsData.updated || '';
  buildNewsCuration();
  renderNews();
}

function buildNewsCuration() {
  const cats = newsData.categories || {};
  const total = Object.values(cats).reduce((s, arr) => s + arr.length, 0);
  if (total === 0) {
    document.getElementById('newsCuration').textContent = '오늘의 헤드라인을 모으는 중…';
    return;
  }
  const top = Object.entries(cats).sort((a, b) => b[1].length - a[1].length)[0];
  const topName = top[0];
  const phrases = {
    'IT': '오늘은 IT/기술 관련 소식이 많아요.',
    'AI': '오늘은 AI 동향이 눈에 띄네요.',
    '반도체': '오늘은 반도체 관련 뉴스가 많아요.',
    '사회': '오늘 사회면에 주목할 이슈가 있어요.',
  };
  document.getElementById('newsCuration').textContent = phrases[topName] || `총 ${total}건의 헤드라인을 정리했어요.`;
}

function renderNews() {
  const tabsEl = document.getElementById('newsTabs');
  const contentEl = document.getElementById('newsContent');
  const cats = Object.keys(newsData.categories || {});
  if (newsData.updated) document.getElementById('newsUpdated').textContent = newsData.updated;
  if (cats.length === 0) {
    contentEl.innerHTML = '<div style="color:var(--text-quat);font-size:13px;padding:18px 0;">뉴스를 불러올 수 없습니다</div>';
    tabsEl.innerHTML = '';
    return;
  }
  tabsEl.innerHTML = cats.map(c => `<button class="news-tab ${c===activeNewsCat?'active':''}" onclick="switchNews('${c}')">${c}</button>`).join('');
  const articles = newsData.categories[activeNewsCat] || [];
  contentEl.innerHTML = `<div class="news-list">${articles.map(a => {
    const pillClass = getPillClass(activeNewsCat);
    return `<a class="news-item" href="${esc(a.link)}" target="_blank" rel="noopener">
      <span class="${pillClass}">${esc(activeNewsCat)}</span>
      <div class="news-body"><div class="news-title">${esc(a.title)}</div>${a.source ? `<div class="news-source">${esc(a.source)}</div>` : ''}</div>
    </a>`;
  }).join('')}</div>`;
}
function switchNews(cat) { activeNewsCat = cat; renderNews(); }

    pv.classList.remove('show');
