<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    :root {
      --bg: #060608;
      --glass: rgba(255,255,255,0.025);
      --glass-hi: rgba(255,255,255,0.05);
      --border: rgba(255,255,255,0.06);
      --border-hi: rgba(255,255,255,0.12);
      --text: #f5f5f0;
      --text-2: #a0a0a8;
      --text-3: #5a5a62;
      --amber: #e8a838;
      --amber-glow: rgba(232,168,56,0.15);
      --teal: #2dd4bf;
      --teal-glow: rgba(45,212,191,0.12);
      --red: #f87171;
      --blue: #60a5fa;
      --green: #34d399;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* Ambient background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 15% 20%, rgba(232,168,56,0.06) 0%, transparent 35%),
        radial-gradient(circle at 85% 80%, rgba(45,212,191,0.05) 0%, transparent 40%),
        radial-gradient(circle at 50% 50%, rgba(139,92,246,0.03) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px;
    }

    /* ─── Header ─── */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--amber);
      box-shadow: 0 0 12px var(--amber-glow);
      animation: breathe 3s ease-in-out infinite;
    }

    @keyframes breathe {
      0%,100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.85); }
    }

    .brand-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-2);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .live-tag {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-3);
      font-weight: 500;
    }

    .live-tag::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: breathe 2s infinite;
    }

    .refresh-btn {
      background: var(--glass);
      border: 1px solid var(--border);
      color: var(--text-2);
      padding: 8px 16px;
      border-radius: 100px;
      cursor: pointer;
      font-size: 12px;
      font-family: inherit;
      font-weight: 500;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .refresh-btn:hover {
      background: var(--glass-hi);
      border-color: var(--border-hi);
      color: var(--text);
      transform: translateY(-1px);
    }

    /* ─── Bento Grid ─── */
    .bento {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-auto-rows: minmax(160px, auto);
      gap: 16px;
    }

    .card {
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 24px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.4s ease, transform 0.3s ease;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border-hi), transparent);
    }

    .card:hover {
      border-color: var(--border-hi);
    }

    /* Card spans */
    .span-2 { grid-column: span 2; }
    .span-4 { grid-column: span 4; }
    .row-2 { grid-row: span 2; }

    /* Card header */
    .card-label {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
    }

    .card-label-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
    }

    .card-label-text {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-3);
      letter-spacing: 1.2px;
      text-transform: uppercase;
    }

    /* ─── Clock Widget (large, span 2) ─── */
    .clock-value {
      font-size: 56px;
      font-weight: 200;
      letter-spacing: -2px;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    .clock-date {
      font-size: 13px;
      color: var(--text-2);
      margin-top: 8px;
      font-weight: 400;
    }

    /* ─── Weather Widget (span 2, row 2) ─── */
    .weather-hero {
      display: flex;
      align-items: flex-end;
      gap: 16px;
    }

    .weather-temp {
      font-size: 64px;
      font-weight: 200;
      letter-spacing: -3px;
      line-height: 0.9;
    }

    .weather-icon {
      font-size: 36px;
      margin-bottom: 8px;
      filter: drop-shadow(0 4px 12px var(--amber-glow));
    }

    .weather-desc {
      font-size: 14px;
      color: var(--text-2);
      margin-top: 4px;
    }

    .weather-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    .weather-stat .stat-label {
      font-size: 10px;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .weather-stat .stat-value {
      font-size: 18px;
      font-weight: 500;
      margin-top: 4px;
      font-variant-numeric: tabular-nums;
    }

    /* ─── AQI Widget ─── */
    .aqi-display {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .aqi-ring {
      width: 80px; height: 80px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 300;
      position: relative;
    }

    .aqi-ring::before {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 2px solid currentColor;
      opacity: 0.3;
    }

    .aqi-grade {
      font-size: 20px;
      font-weight: 600;
    }

    .aqi-sub {
      font-size: 12px;
      color: var(--text-3);
      margin-top: 2px;
    }

    .aqi-breakdown {
      display: flex;
      gap: 16px;
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    .aqi-mini {
      flex: 1;
    }

    .aqi-mini .stat-label {
      font-size: 10px;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .aqi-mini .stat-value {
      font-size: 16px;
      font-weight: 500;
      margin-top: 2px;
      font-variant-numeric: tabular-nums;
    }

    /* ─── Exchange Rate Widget ─── */
    .rate-rows {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .rate-item {
      display: grid;
      grid-template-columns: 48px 1fr auto;
      align-items: center;
      gap: 12px;
    }

    .rate-code {
      font-size: 14px;
      font-weight: 700;
      color: var(--amber);
    }

    .rate-bar {
      height: 1px;
      background: var(--border);
    }

    .rate-value {
      font-size: 15px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      text-align: right;
    }

    .rate-value-wrap {
      text-align: right;
    }

    .rate-delta {
      font-size: 10px;
      font-weight: 600;
      margin-top: 2px;
    }

    .rate-delta.up { color: var(--red); }
    .rate-delta.down { color: var(--blue); }

    /* ─── GitHub Widget ─── */
    .gh-rows {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .gh-row {
      display: flex;
      gap: 12px;
      text-decoration: none;
      color: var(--text);
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      transition: padding-left 0.2s;
    }

    .gh-row:last-child { border-bottom: none; }
    .gh-row:hover { padding-left: 8px; }

    .gh-type {
      width: 32px; height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      background: var(--glass-hi);
    }

    .gh-body { flex: 1; min-width: 0; }

    .gh-repo {
      font-size: 12px;
      font-weight: 600;
      color: var(--teal);
    }

    .gh-msg {
      font-size: 12px;
      color: var(--text-2);
      margin-top: 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .gh-time {
      font-size: 10px;
      color: var(--text-3);
      margin-top: 2px;
    }

    /* ─── Stock Widget ─── */
    .stock-rows {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .stock-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .stock-left { display: flex; flex-direction: column; }
    .stock-name { font-size: 13px; font-weight: 600; }
    .stock-code { font-size: 10px; color: var(--text-3); margin-top: 1px; }

    .stock-right { text-align: right; }
    .stock-price { font-size: 16px; font-weight: 600; font-variant-numeric: tabular-nums; }
    .stock-chg { font-size: 11px; font-weight: 600; margin-top: 1px; }
    .stock-chg.up { color: var(--red); }
    .stock-chg.down { color: var(--blue); }
    .stock-chg.flat { color: var(--text-3); }

    /* ─── Loading ─── */
    .loading {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 16px 0;
    }

    .loading span {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--text-3);
      animation: pulse-load 1.4s infinite ease-in-out;
    }

    .loading span:nth-child(2) { animation-delay: 0.2s; }
    .loading span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse-load {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1.2); }
    }

    .error {
      font-size: 12px;
      color: var(--text-3);
      padding: 12px 0;
      text-align: center;
    }

    /* ─── Responsive ─── */
    @media (max-width: 900px) {
      .bento { grid-template-columns: repeat(2, 1fr); }
      .span-2, .span-4 { grid-column: span 2; }
      .row-2 { grid-row: span 1; }
    }

    @media (max-width: 600px) {
      .container { padding: 16px; }
      .bento { grid-template-columns: 1fr; gap: 12px; }
      .span-2, .span-4 { grid-column: span 1; }
      .clock-value { font-size: 42px; }
      .weather-temp { font-size: 48px; }
      .weather-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Top Bar -->
    <div class="top-bar">
      <div class="brand">
        <div class="brand-dot"></div>
        <div class="brand-name">Dashboard</div>
      </div>
      <div class="top-actions">
        <div class="live-tag" id="last-update">LIVE</div>
        <button class="refresh-btn" onclick="refreshAll()">새로고침</button>
      </div>
    </div>

    <!-- Bento Grid -->
    <div class="bento">
      <!-- Clock — span 2 -->
      <div class="card span-2">
        <div class="card-label">
          <div class="card-label-dot" style="background:var(--amber)"></div>
          <div class="card-label-text">Now</div>
        </div>
        <div class="clock-value" id="clock-time">--:--</div>
        <div class="clock-date" id="clock-date">—</div>
      </div>

      <!-- Weather — span 2 -->
      <div class="card span-2">
        <div class="card-label">
          <div class="card-label-dot" style="background:var(--teal)"></div>
          <div class="card-label-text">Weather · 인천 남동구</div>
        </div>
        <div id="weather-content" class="loading"><span></span><span></span><span></span></div>
      </div>

      <!-- AQI — span 2 -->
      <div class="card span-2">
        <div class="card-label">
          <div class="card-label-dot" style="background:var(--green)"></div>
          <div class="card-label-text">Air Quality</div>
        </div>
        <div id="aqi-content" class="loading"><span></span><span></span><span></span></div>
      </div>

      <!-- Exchange Rates — span 2 -->
      <div class="card span-2">
        <div class="card-label">
          <div class="card-label-dot" style="background:var(--amber)"></div>
          <div class="card-label-text">FX Rates · KRW</div>
        </div>
        <div id="rate-content" class="loading"><span></span><span></span><span></span></div>
      </div>

      <!-- GitHub — span 2 -->
      <div class="card span-2">
        <div class="card-label">
          <div class="card-label-dot" style="background:var(--text-2)"></div>
          <div class="card-label-text">GitHub Activity</div>
        </div>
        <div id="gh-content" class="loading"><span></span><span></span><span></span></div>
      </div>

      <!-- Stocks — span 2 -->
      <div class="card span-2">
        <div class="card-label">
          <div class="card-label-dot" style="background:var(--red)"></div>
          <div class="card-label-text">Stocks</div>
        </div>
        <div id="stock-content" class="loading"><span></span><span></span><span></span></div>
      </div>
    </div>
  </div>

  <script>
    // ═══════════════════════════════════════════════════════════════
    // Dashboard Engine — 무료 API만 사용
    // ═══════════════════════════════════════════════════════════════

    const LAT = 37.4476, LON = 126.7316; // 인천 남동구
    let prevRates = {};

    // ─── Clock ────────────────────────────────────────────────────────
    function updateClock() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      const s = String(now.getSeconds()).padStart(2, '0');
      const el = document.getElementById('clock-time');
      el.textContent = `${h}:${m}`;

      const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const dateStr = `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}`;
      document.getElementById('clock-date').textContent = dateStr;
    }
    updateClock();
    setInterval(() => {
      const now = new Date();
      const s = String(now.getSeconds()).padStart(2, '0');
      const el = document.getElementById('clock-time');
      const cur = el.textContent;
      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      el.textContent = `${h}:${m}`;
      updateClock();
    }, 1000);

    // ─── Weather (Open-Meteo) ────────────────────────────────────────
    async function loadWeather() {
      const el = document.getElementById('weather-content');
      try {
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m&daily=temperature_2m_max,temperature_2m_min&timezone=Asia/Seoul`;
        const data = await (await fetch(url)).json();

        const temp = Math.round(data.current.temperature_2m);
        const feels = Math.round(data.current.apparent_temperature);
        const humidity = data.current.relative_humidity_2m;
        const wind = Math.round(data.current.wind_speed_10m);
        const code = data.current.weather_code;
        const maxT = Math.round(data.daily.temperature_2m_max[0]);
        const minT = Math.round(data.daily.temperature_2m_min[0]);

        const icon = wIcon(code);
        const desc = wDesc(code);

        el.innerHTML = `
          <div class="weather-hero">
            <div>
              <div class="weather-temp">${temp}°</div>
              <div class="weather-desc">${desc} · 체감 ${feels}°</div>
            </div>
            <div class="weather-icon">${icon}</div>
          </div>
          <div class="weather-grid">
            <div class="weather-stat">
              <div class="stat-label">High</div>
              <div class="stat-value">${maxT}°</div>
            </div>
            <div class="weather-stat">
              <div class="stat-label">Low</div>
              <div class="stat-value">${minT}°</div>
            </div>
            <div class="weather-stat">
              <div class="stat-label">Humidity</div>
              <div class="stat-value">${humidity}%</div>
            </div>
            <div class="weather-stat">
              <div class="stat-label">Wind</div>
              <div class="stat-value">${wind}km/h</div>
            </div>
          </div>
        `;
      } catch(e) {
        el.innerHTML = '<div class="error">날씨 로드 실패</div>';
      }
    }

    function wIcon(c) {
      if (c===0) return '☀️'; if (c<=3) return '⛅'; if (c<=48) return '🌫️';
      if (c<=67) return '🌧️'; if (c<=77) return '🌨️'; if (c<=82) return '🌦️';
      if (c>=95) return '⛈️'; return '🌤️';
    }
    function wDesc(c) {
      if (c===0) return '맑음'; if (c<=3) return '구름 많음'; if (c<=48) return '안개';
      if (c<=57) return '이슬비'; if (c<=67) return '비'; if (c<=77) return '눈';
      if (c<=82) return '소나기'; if (c>=95) return '뇌우'; return '흐림';
    }

    // ─── Air Quality ─────────────────────────────────────────────────
    async function loadAQI() {
      const el = document.getElementById('aqi-content');
      try {
        const url = `https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${LAT}&longitude=${LON}&current=pm10,pm2_5,ozone,nitrogen_dioxide&timezone=Asia/Seoul`;
        const data = await (await fetch(url)).json();
        const pm10 = data.current.pm10, pm25 = data.current.pm2_5;
        const o3 = data.current.ozone, no2 = data.current.nitrogen_dioxide;
        const grade = pm10<=30?'좋음':pm10<=80?'보통':pm10<=150?'나쁨':'매우 나쁨';
        const color = pm10<=30?'var(--green)':pm10<=80?'var(--amber)':pm10<=150?'var(--red)':'#991b1b';

        el.innerHTML = `
          <div class="aqi-display">
            <div class="aqi-ring" style="color:${color}">${Math.round(pm10)}</div>
            <div>
              <div class="aqi-grade" style="color:${color}">${grade}</div>
              <div class="aqi-sub">PM10 µg/m³</div>
            </div>
          </div>
          <div class="aqi-breakdown">
            <div class="aqi-mini"><div class="stat-label">PM2.5</div><div class="stat-value">${Math.round(pm25)}</div></div>
            <div class="aqi-mini"><div class="stat-label">O₃</div><div class="stat-value">${Math.round(o3)}</div></div>
            <div class="aqi-mini"><div class="stat-label">NO₂</div><div class="stat-value">${Math.round(no2)}</div></div>
          </div>
        `;
      } catch(e) {
        el.innerHTML = '<div class="error">대기질 로드 실패</div>';
      }
    }

    // ─── Exchange Rates ──────────────────────────────────────────────
    async function loadRates() {
      const el = document.getElementById('rate-content');
      try {
        const data = await (await fetch('https://open.er-api.com/v6/latest/KRW')).json();
        const rates = data.rates;
        const items = [
          { code:'USD', rate:rates.USD },
          { code:'EUR', rate:rates.EUR },
          { code:'JPY', rate:rates.JPY*100 },
          { code:'CNY', rate:rates.CNY },
        ];

        let html = '<div class="rate-rows">';
        items.forEach(c => {
          const value = (1/c.rate).toFixed(1);
          const prev = prevRates[c.code];
          let delta = '';
          if (prev) {
            const diff = (1/c.rate - 1/prev);
            if (Math.abs(diff) > 0.05) {
              const cls = diff>0?'up':'down';
              const arrow = diff>0?'▲':'▼';
              delta = `<div class="rate-delta ${cls}">${arrow} ${Math.abs(diff).toFixed(1)}</div>`;
            }
          }
          prevRates[c.code] = c.rate;
          html += `<div class="rate-item">
            <span class="rate-code">${c.code}</span>
            <span class="rate-bar"></span>
            <div class="rate-value-wrap">
              <div class="rate-value">${value}</div>
              ${delta}
            </div>
          </div>`;
        });
        html += '</div>';
        el.innerHTML = html;
      } catch(e) {
        el.innerHTML = '<div class="error">환율 로드 실패</div>';
      }
    }

    // ─── GitHub ───────────────────────────────────────────────────────
    async function loadGitHub() {
      const el = document.getElementById('gh-content');
      try {
        const resp = await fetch('https://api.github.com/users/leemind-q/events/public?per_page=5');
        if (!resp.ok) throw new Error('rate limit');
        const events = await resp.json();
        if (!Array.isArray(events) || events.length === 0) {
          el.innerHTML = '<div class="error">최근 활동 없음</div>';
          return;
        }

        const typeIcons = { PushEvent:'⬆️', CreateEvent:'✨', WatchEvent:'⭐', ForkEvent:'🍴', ReleaseEvent:'📦', IssuesEvent:'🔵', PullRequestEvent:'🔀' };

        let html = '<div class="gh-rows">';
        events.slice(0,5).forEach(ev => {
          let msg = '', repo = ev.repo.name, url = `https://github.com/${repo}`;
          if (ev.type==='PushEvent') {
            const c = ev.payload.commits||[];
            msg = c.length>0 ? (c[0].message||'').split('\n')[0] : 'push';
            url = `https://github.com/${repo}/commit/${c[0]?.sha||''}`;
          } else if (ev.type==='CreateEvent') msg = `${ev.payload.ref_type||''} 생성: ${ev.payload.ref||''}`;
          else if (ev.type==='WatchEvent') msg = '스타';
          else if (ev.type==='ForkEvent') msg = '포크';
          else if (ev.type==='ReleaseEvent') msg = `릴리즈: ${ev.payload.release?.name||''}`;
          else msg = ev.type.replace('Event','');

          const icon = typeIcons[ev.type] || '•';
          const t = timeAgo(ev.created_at);

          html += `<a class="gh-row" href="${url}" target="_blank">
            <div class="gh-type">${icon}</div>
            <div class="gh-body">
              <div class="gh-repo">${esc(repo)}</div>
              <div class="gh-msg">${esc(msg)}</div>
              <div class="gh-time">${t}</div>
            </div>
          </a>`;
        });
        html += '</div>';
        el.innerHTML = html;
      } catch(e) {
        el.innerHTML = '<div class="error">GitHub API 한도</div>';
      }
    }

    function timeAgo(d) {
      const m = Math.floor((Date.now()-new Date(d))/60000);
      if (m<1) return '방금'; if (m<60) return `${m}분 전`;
      const h = Math.floor(m/60); if (h<24) return `${h}시간 전`;
      return `${Math.floor(h/24)}일 전`;
    }
    function esc(s) { if(!s) return ''; const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

    // ─── Stocks ──────────────────────────────────────────────────────
    async function loadStocks() {
      const el = document.getElementById('stock-content');
      const stocks = [
        { name:'삼성전자', code:'005930' },
        { name:'SK하이닉스', code:'000660' },
        { name:'현대차', code:'005380' },
      ];
      try {
        const results = await Promise.allSettled(stocks.map(async s => {
          const ctrl = new AbortController();
          const t = setTimeout(()=>ctrl.abort(), 8000);
          try {
            const url = `https://api.allorigins.win/raw?url=${encodeURIComponent('https://finance.naver.com/item/main.naver?code='+s.code)}`;
            const html = await (await fetch(url, {signal:ctrl.signal})).text();
            const pm = html.match(/<div class="blind">\s*<p>\s*현재가\s*([\d,]+)/);
            const cm = html.match(/전일비\s*([-]?[\d.]+)%/);
            return { name:s.name, code:s.code, price:pm?pm[1]:'N/A', change:cm?parseFloat(cm[1]):0 };
          } finally { clearTimeout(t); }
        }));

        let html = '<div class="stock-rows">';
        results.forEach((r,i) => {
          if (r.status==='fulfilled' && r.value && r.value.price!=='N/A') {
            const s = r.value;
            const cls = s.change>0?'up':s.change<0?'down':'flat';
            const arrow = s.change>0?'▲':s.change<0?'▼':'—';
            html += `<div class="stock-item">
              <div class="stock-left"><div class="stock-name">${s.name}</div><div class="stock-code">${s.code}</div></div>
              <div class="stock-right"><div class="stock-price">${s.price}</div><div class="stock-chg ${cls}">${arrow} ${Math.abs(s.change)}%</div></div>
            </div>`;
          } else {
            const s = stocks[i];
            html += `<div class="stock-item">
              <div class="stock-left"><div class="stock-name">${s.name}</div><div class="stock-code">${s.code}</div></div>
              <div class="stock-right"><a href="https://finance.naver.com/item/main.naver?code=${s.code}" target="_blank" style="font-size:11px;color:var(--text-3);text-decoration:none">네이버 금융 →</a></div>
            </div>`;
          }
        });
        html += '</div>';
        el.innerHTML = html;
      } catch(e) {
        el.innerHTML = '<div class="error">주식 로드 실패</div>';
      }
    }

    // ─── Refresh ─────────────────────────────────────────────────────
    function refreshAll() {
      loadWeather(); loadAQI(); loadRates(); loadGitHub(); loadStocks();
      const now = new Date();
      document.getElementById('last-update').textContent = `UPDATED ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
    }
    refreshAll();
    setInterval(refreshAll, 300000);
  </script>
